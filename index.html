<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>몸회수</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* Surfaces — navy identity kept, softened & warmed slightly */
  --bg:#0E1522;--surface:#161F2E;--surface-elevated:#1C2738;--surface-soft:#222E40;
  /* Legacy aliases so existing var() usages keep working */
  --card:#161F2E;--card2:#1C2738;--card3:#222E40;
  /* Text */
  --text-primary:#F5F7FA;--text-secondary:#A7B0BE;--text-muted:#707B8D;
  --text:#F5F7FA;--muted:#8C97A7;
  /* Accent (mint) = 완료·실행·긍정 only */
  --accent:#43D6A5;--accent-strong:#28C995;--accent-soft:rgba(67,214,165,0.12);
  --mint:#43D6A5;
  /* Warm (orange) = 현재 날짜·부분 완료·주의 only */
  --warm:#F5AA3C;--warm-soft:rgba(245,170,60,0.12);
  --amber:#F5AA3C;
  /* De-emphasized legacy colors (kept defined to avoid breakage; reduced in later step) */
  --blue:#75A7FF;--purple:#A78BFA;--red:#FF6F78;
  /* Borders / dividers — soft translucent */
  --border:rgba(255,255,255,0.075);--borderlit:rgba(255,255,255,0.14);--divider:rgba(255,255,255,0.055);
  /* Radius scale by role */
  --radius-sm:10px;--radius-md:14px;--radius-lg:18px;--radius-xl:24px;--radius-pill:999px;
  --r-lg:18px;--r-md:14px;--r-sm:10px;
  /* Spacing (8px system) */
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-8:32px;--space-10:40px;
  /* Type scale */
  --font-display:30px;--font-page-title:25px;--font-section-title:19px;--font-body:16px;--font-small:14px;--font-caption:12px;
  /* Shadow — used on ONE hero area only */
  --shadow-hero:0 8px 24px rgba(0,0,0,0.16);--shadow-card:none;--shadow-soft:none;
  --ease:cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);color:var(--text-primary);font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-size:var(--font-body);font-weight:450;line-height:1.55;letter-spacing:-0.015em;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;padding-bottom:calc(84px + env(safe-area-inset-bottom));}
input,textarea,button{font-family:inherit;letter-spacing:inherit;}
button{cursor:pointer;border:none;background:none;transition:transform .12s var(--ease),opacity .16s var(--ease),background-color .16s var(--ease);}
button:active{transform:scale(.98);}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

/* Number rendering — even-width digits */
.streak-num,.sh-count b,.total-num,.pm-val,.pm-goal{font-variant-numeric:tabular-nums;}

/* Button system (available app-wide; applied progressively) */
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:52px;padding:14px 20px;background:var(--accent);color:#0B1320;font-weight:650;font-size:var(--font-body);border-radius:var(--radius-md);letter-spacing:-0.01em;}
.btn-primary:active{background:var(--accent-strong);}
.btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:48px;padding:12px 18px;background:var(--surface-elevated);color:var(--text-primary);font-weight:550;font-size:var(--font-small);border-radius:var(--radius-md);border:1px solid var(--border);}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;background:none;color:var(--text-secondary);font-weight:500;font-size:var(--font-small);border-radius:var(--radius-md);}
.btn-ghost:active{background:rgba(255,255,255,0.04);}

/* ONBOARDING */
#onboard{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100dvh;padding:env(safe-area-inset-top,0px) 24px calc(32px + env(safe-area-inset-bottom,0px));overflow-y:auto;}
.ob-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 0 0;min-height:0;}
.ob-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:6px;}
.ob-logo{font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:0;display:flex;align-items:center;gap:8px;}
.ob-sub{font-size:14px;color:var(--muted);margin-bottom:24px;text-align:center;line-height:1.7;}
.ob-card{background:var(--card);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;border:1px solid var(--border);box-shadow:var(--shadow-hero);margin-top:auto;}
.ob-step{font-size:13px;color:var(--amber);font-weight:700;margin-bottom:18px;}
.ob-title{font-size:20px;font-weight:800;margin-bottom:6px;}
.ob-desc{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.ob-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.ob-input{width:100%;background:var(--card2);border:1.5px solid var(--borderlit);border-radius:14px;color:var(--text);font-size:22px;font-weight:700;padding:14px 18px;outline:none;margin-bottom:14px;}
.ob-btn{width:100%;padding:16px;background:var(--amber);color:#0B1120;font-weight:800;font-size:16px;border-radius:14px;margin-top:8px;letter-spacing:0.5px;}
.ob-btn:disabled{opacity:0.4;}
.ob-mirror{font-size:52px;text-align:center;margin-bottom:14px;}
.ob-summary{background:var(--card2);border-radius:14px;padding:18px 20px;margin-bottom:22px;}
.ob-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;}
.ob-row:last-child{margin-bottom:0;}

/* MAIN */
#app{display:none;}
.header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.header-left .app-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.header-left .app-day{font-size:12px;color:var(--muted);margin-top:3px;}
.header-right .streak-num{font-size:28px;font-weight:800;line-height:1;text-align:right;}
.header-right .streak-label{font-size:11px;color:var(--muted);text-align:right;}

.content{padding:16px 20px 0;}
.card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow-card);}

/* Date strip */
.date-strip-wrap{padding:14px 20px 0;}
.date-strip-wrap .date-strip{margin-bottom:0;}
.date-strip{display:flex;gap:7px;margin-bottom:14px;align-items:stretch;}
.date-chip{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 2px;border-radius:14px;background:var(--card2);border:1px solid var(--borderlit);transition:all .15s;min-width:0;}
.date-dow{font-size:10px;color:var(--muted);font-weight:600;}
.date-md{font-size:14px;font-weight:800;color:var(--text);}
.date-chip.sel{background:var(--card);border-color:var(--borderlit);}
.date-chip.today{border-color:var(--amber);}
.date-chip.today.sel{background:var(--amber);}
.date-chip.today.sel .date-dow{color:#0B1120cc;}
.date-chip.today.sel .date-md{color:#0B1120;}
.date-chip.sel:not(.today){background:#60A5FA22;border-color:#60A5FA88;}
.date-chip.sel:not(.today) .date-md{color:var(--blue);}
.date-cal{display:flex;align-items:center;justify-content:center;padding:0 14px;border-radius:14px;background:var(--card2);border:1px solid var(--borderlit);transition:all .15s;}
.date-cal:active{background:var(--card3);}
.edit-banner{background:#F5A62318;border:1px solid #F5A62344;border-radius:12px;padding:10px 14px;font-size:12px;color:var(--amber);margin-bottom:14px;text-align:center;}
.card-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}

/* SUCCESS HERO (NEW - top priority) */
.success-hero{margin:16px 20px 0;background:linear-gradient(135deg,#0d2010,#0d1f1a);border:1px solid #2DD4A040;border-radius:20px;padding:22px 24px;box-shadow:var(--shadow-hero);}
.sh-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.sh-count{font-size:15px;color:var(--muted);}
.sh-count b{color:var(--mint);font-size:28px;font-weight:800;}
.sh-recover{font-size:12px;color:var(--mint);background:#2DD4A018;padding:5px 12px;border-radius:20px;border:1px solid #2DD4A044;font-weight:600;}
.sh-checks{display:flex;gap:10px;}
.sh-check{flex:1;text-align:center;padding:12px 6px;border-radius:14px;background:var(--card2);border:1px solid var(--borderlit);transition:transform .15s var(--ease),background .2s var(--ease),border-color .2s var(--ease);}
.sh-check:active{transform:scale(.96);}
.sh-check.done{background:#2DD4A018;border-color:#2DD4A066;}
.sh-check.done .sh-check-icon{animation:pop .25s var(--ease);}
@keyframes pop{0%{transform:scale(.6);}60%{transform:scale(1.15);}100%{transform:scale(1);}}
.sh-check-icon{font-size:22px;margin-bottom:4px;}
.sh-check-lbl{font-size:11px;color:var(--muted);}
.sh-check.done .sh-check-lbl{color:var(--mint);font-weight:700;}
.sh-msg{margin-top:14px;font-size:13px;color:var(--text);line-height:1.6;text-align:center;background:#00000030;padding:12px;border-radius:12px;}

/* Cumulative totals strip */
.totals-strip{margin:12px 20px 0;display:flex;gap:8px;}
.total-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 6px;text-align:center;}
.total-num{font-size:22px;font-weight:800;line-height:1;}
.total-num .unit{font-size:11px;font-weight:600;color:var(--muted);}
.total-lbl{font-size:10px;color:var(--muted);margin-top:5px;}
.total-icon{font-size:14px;margin-bottom:4px;}

/* progress (now secondary) */
.progress-mini{margin:12px 20px 0;background:var(--card);border-radius:16px;padding:16px 20px;border:1px solid var(--border);}
.pm-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.pm-val{font-size:26px;font-weight:800;line-height:1;}
.pm-unit{font-size:13px;color:var(--muted);font-weight:400;}
.pm-label{font-size:10px;color:var(--muted);margin-bottom:3px;}
.pm-goal{font-size:20px;font-weight:800;color:var(--mint);line-height:1;}
.pm-bar-bg{height:5px;background:var(--card3);border-radius:99px;overflow:hidden;}
.pm-bar-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--mint));border-radius:99px;transition:width .8s ease;}
.pm-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;}

/* Weight input */
.weight-input{width:100%;background:var(--card2);border:1.5px solid var(--borderlit);border-radius:14px;color:var(--text);font-size:36px;font-weight:800;padding:10px 16px;outline:none;text-align:center;letter-spacing:-2px;}
.weight-row{display:flex;gap:10px;align-items:center;}
.weight-unit{font-size:16px;color:var(--muted);font-weight:600;}
.weight-diff{font-size:13px;color:var(--mint);font-weight:700;white-space:nowrap;}

/* Habit chips */
.habit-group{margin-bottom:12px;}
.habit-name{font-size:12px;color:var(--muted);margin-bottom:7px;}
.chip-row{display:flex;gap:8px;}
.chip{flex:1;padding:11px 8px;border-radius:12px;font-size:12px;font-weight:600;border:1px solid var(--borderlit);background:var(--card2);color:var(--muted);transition:all .15s;line-height:1.3;}
.chip.on-mint{background:#2DD4A022;color:var(--mint);border-color:#2DD4A088;}
.chip.on-amber{background:#F5A62322;color:var(--amber);border-color:#F5A62388;}
.chip.on-red{background:#F8717122;color:var(--red);border-color:#F8717188;}
.chip.on-yellow{background:#FBBF2422;color:#FBBF24;border-color:#FBBF2488;}

/* Exercise */
.ex-label{font-size:12px;color:var(--muted);margin-bottom:8px;}
.ex-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.ex-chip{padding:9px 11px;border-radius:12px;font-size:12px;font-weight:600;border:1px solid var(--borderlit);background:var(--card2);color:var(--muted);transition:all .15s;}
.ex-chip.on{background:#F5A62322;color:var(--amber);border-color:#F5A62388;}
.ex-chip.on-blue{background:#60A5FA22;color:var(--blue);border-color:#60A5FA88;}
.ex-chip.on-mint{background:#2DD4A022;color:var(--mint);border-color:#2DD4A088;}

/* Note */
.note-ta{width:100%;background:var(--card2);border:1px solid var(--borderlit);border-radius:12px;color:var(--text);font-size:14px;padding:12px 14px;outline:none;resize:none;min-height:90px;line-height:1.6;display:block;}

/* Mood */
.mood-row{display:flex;gap:7px;margin-bottom:14px;}
.mood-chip{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 4px;border-radius:14px;background:var(--card2);border:1px solid var(--borderlit);transition:all .15s;}
.mood-emoji{font-size:24px;filter:grayscale(0.6);transition:filter .15s;}
.mood-lbl{font-size:10px;color:var(--muted);}
.mood-chip.sel{border-width:1.5px;}
.mood-chip.sel .mood-emoji{filter:grayscale(0);}
.mood-chip.sel .mood-lbl{font-weight:700;}

/* AI auto line */
.ai-line{background:linear-gradient(135deg,#0d1f35,#131b30);border:1px solid #60A5FA33;border-radius:16px;padding:18px 20px;margin-bottom:12px;}
.ai-line-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-line-badge{font-size:11px;color:var(--blue);font-weight:700;}
.ai-line-text{font-size:14px;line-height:1.7;color:var(--text);}
.ai-line-loading{font-size:13px;color:var(--muted);}
.ai-detail-btn{margin-top:12px;width:100%;padding:11px;font-size:13px;background:#60A5FA15;color:var(--blue);border:1px solid #60A5FA33;border-radius:12px;font-weight:600;}

/* Tip tab */
.tip-eval{background:#0d2010;border:1px solid #2DD4A033;border-radius:20px;padding:20px;margin-bottom:12px;}
.tip-item{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;}
.tip-num{width:30px;height:30px;border-radius:10px;background:#60A5FA22;border:1px solid #60A5FA44;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:var(--blue);font-weight:800;margin-right:10px;vertical-align:middle;}
.tip-item-title{font-size:14px;font-weight:700;color:var(--blue);display:inline;vertical-align:middle;}
.tip-item-body{font-size:13px;line-height:1.8;margin-top:10px;padding-left:40px;color:var(--text);}
.tip-quote{background:linear-gradient(135deg,#1a1a2e,#1e1a2e);border:1px solid #A78BFA44;border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:12px;}
.tip-empty{background:var(--card);border-radius:20px;padding:48px 20px;text-align:center;color:var(--muted);font-size:14px;line-height:1.8;}
.loading-wrap{background:var(--card);border-radius:20px;padding:48px 20px;text-align:center;margin-bottom:12px;}

/* Chart */
.chart-wrap{overflow-x:auto;}
.chart-note{font-size:12px;color:var(--muted);text-align:center;margin-top:8px;font-style:italic;}
.chart-meta{margin-top:18px;border-top:1px solid var(--border);padding-top:16px;}
.chart-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;}

/* Stats in trend tab */
.stat-summary-row{display:flex;gap:8px;margin-bottom:16px;}
.stat-sum-box{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px 6px;text-align:center;}
.stat-sum-num{font-size:24px;font-weight:800;line-height:1;}
.stat-sum-num .u{font-size:11px;font-weight:600;color:var(--muted);}
.stat-sum-lbl{font-size:10px;color:var(--muted);margin-top:5px;}
.stat-bar-item{margin-bottom:14px;}
.stat-bar-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.stat-bar-name{font-size:13px;color:var(--text);}
.stat-bar-val{font-size:13px;font-weight:700;}
.stat-bar-bg{height:8px;background:var(--card3);border-radius:99px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:99px;transition:width .8s ease;}

/* Calendar ring view */
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
.cal-dow{text-align:center;font-size:10px;color:var(--muted);font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
.cal-cell.empty{visibility:hidden;}
.cal-ring{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.cal-ring svg{width:100%;height:100%;max-width:42px;max-height:42px;}
.cal-num{position:relative;font-size:12px;font-weight:700;color:var(--text);z-index:1;}
.cal-num.future{color:#3a4258;}
.cal-cell.today .cal-num{color:var(--amber);font-weight:800;}
.cal-legend{display:flex;justify-content:center;gap:14px;margin-top:14px;flex-wrap:wrap;}
.cal-legend span{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;}
.cal-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

/* Log */
.log-item{background:var(--card);border-radius:20px;padding:18px 20px;margin-bottom:12px;border-left:3px solid var(--mint);}
.log-item.bad{border-left-color:var(--amber);}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.log-tags{display:flex;gap:6px;flex-wrap:wrap;font-size:12px;}
.log-note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;}

/* Alarm */
.alarm-item{background:var(--card);border-radius:20px;padding:16px 20px;margin-bottom:12px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.alarm-time{background:var(--card2);border:1px solid var(--borderlit);border-radius:10px;color:var(--text);font-size:18px;font-weight:700;padding:8px 12px;outline:none;}
.alarm-label{flex:1;font-size:13px;}
.alarm-label-input{flex:1;min-width:0;background:var(--card2);border:1px solid var(--borderlit);border-radius:10px;color:var(--text);font-size:13px;padding:9px 12px;outline:none;}
.alarm-label-input:focus{border-color:var(--amber);}
.alarm-del{padding:7px 10px;font-size:13px;border-radius:10px;border:1px solid var(--borderlit);background:var(--card2);color:var(--muted);flex-shrink:0;}
.alarm-del:active{background:#F8717122;color:var(--red);}
.alarm-add{width:100%;padding:14px;background:var(--card2);border:1.5px dashed var(--borderlit);border-radius:16px;color:var(--amber);font-size:14px;font-weight:600;}
.alarm-toggle{padding:7px 16px;font-size:12px;font-weight:700;border-radius:10px;border:1px solid var(--borderlit);background:var(--card2);color:var(--muted);}
.alarm-toggle.on{background:#2DD4A022;color:var(--mint);border-color:var(--mint);}

/* Friends */
.friend-me{background:linear-gradient(135deg,#0d2010,#0d1f1a);border:1px solid #2DD4A040;border-radius:20px;padding:20px;margin-bottom:14px;}
.friend-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.friend-avatar{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.friend-info{flex:1;min-width:0;}
.friend-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.friend-sub{font-size:11px;color:var(--muted);}
.friend-stats{display:flex;gap:16px;align-items:center;flex-shrink:0;}
.friend-stat{text-align:center;}
.friend-stat-num{font-size:18px;font-weight:800;line-height:1;}
.friend-stat-lbl{font-size:9px;color:var(--muted);margin-top:3px;}
.friend-rate-bar{height:5px;background:var(--card3);border-radius:99px;overflow:hidden;margin-top:8px;}
.friend-rate-fill{height:100%;border-radius:99px;transition:width .8s ease;}
.friend-online{width:8px;height:8px;border-radius:50%;background:var(--mint);display:inline-block;margin-right:4px;}
.friend-offline{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px;}
.friend-add{width:100%;padding:15px;background:var(--card2);border:1.5px dashed var(--borderlit);border-radius:16px;color:var(--blue);font-size:14px;font-weight:600;margin-top:6px;}
.friend-code{background:var(--card2);border:1px solid var(--borderlit);border-radius:14px;padding:16px 18px;margin-bottom:14px;text-align:center;}
.friend-code-val{font-size:24px;font-weight:800;letter-spacing:4px;color:var(--amber);margin:8px 0;}
.demo-badge{background:#A78BFA22;color:var(--purple);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid #A78BFA44;}
.friend-section-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:18px 4px 12px;}
.privacy-note{background:#12122a;border:1px solid #2a2a5a;border-radius:16px;padding:14px 18px;margin-top:14px;}

/* Bottom tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--divider);display:flex;align-items:flex-start;min-height:68px;padding:10px 0 calc(8px + env(safe-area-inset-bottom));z-index:100;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;min-height:44px;padding-top:2px;}
.tab-icon{display:flex;align-items:center;justify-content:center;height:24px;}
.tab-icon svg{width:23px;height:23px;stroke:var(--text-muted);transition:stroke .15s var(--ease);}
.tab-btn:has(.tab-lbl.active) .tab-icon svg{stroke:var(--accent);}
.tab-lbl{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:-0.01em;transition:color .15s;}
.tab-lbl.active{color:var(--accent);font-weight:650;}
.tab-dot{width:20px;height:2px;background:var(--accent);border-radius:99px;margin-top:1px;}

/* Toast */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--borderlit);border-radius:14px;padding:12px 24px;font-size:14px;box-shadow:0 8px 32px #00000080;z-index:200;white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;}
#toast.show{opacity:1;}
/* ============ STEP 2 REFINEMENT ============ */
.ic{width:1.05em;height:1.05em;vertical-align:-0.15em;flex-shrink:0;}

/* Brand mirror in header / onboarding */
.header-left .app-name{display:flex;align-items:center;gap:7px;font-size:22px;font-weight:700;letter-spacing:-0.03em;}
.brand-mark{display:inline-flex;}
.brand-mark svg{display:block;}
.ob-logo{display:flex;align-items:center;justify-content:center;gap:8px;}
.ob-mark{display:inline-flex;}

/* Header streak as sentence */
.streak-status{font-size:13px;color:var(--text-secondary);font-weight:450;text-align:right;line-height:1.4;}
.streak-status .ss-strong{color:var(--accent);font-weight:650;}

/* Page titles (used across screens) */
.page-title{font-size:var(--font-page-title);font-weight:700;letter-spacing:-0.035em;line-height:1.3;margin-bottom:4px;}
.page-sub{font-size:var(--font-small);color:var(--text-secondary);font-weight:450;line-height:1.5;margin-bottom:22px;}

/* Edit banner icon */
.eb-ic{display:inline-flex;margin-right:4px;}
.eb-ic .ic{width:14px;height:14px;}

/* Totals — light inline summary, no boxes */
.totals-strip{margin:14px 20px 4px;align-items:center;gap:0;}
.tl-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tl-num{font-size:18px;font-weight:650;color:var(--text-primary);font-variant-numeric:tabular-nums;}
.tl-num.accent{color:var(--accent);}
.tl-lbl{font-size:11px;color:var(--text-muted);font-weight:450;}
.tl-div{width:1px;height:24px;background:var(--divider);}

/* Success hero check icons (SVG) */
.sh-check-icon{height:24px;display:flex;align-items:center;justify-content:center;margin-bottom:5px;}
.sh-check-icon svg{width:22px;height:22px;stroke:var(--text-secondary);}
.sh-check.done .sh-check-icon svg{stroke:var(--accent);}

/* Mood — colored face icon */
.mood-dot{width:9px;height:9px;border-radius:50%;background:var(--text-muted);transition:background .15s;}
.mood-face{display:flex;align-items:center;justify-content:center;line-height:1;filter:saturate(0.55);transition:filter .18s;}
.mood-chip.sel .mood-face{filter:saturate(1) drop-shadow(0 1px 4px rgba(0,0,0,0.18));}

/* Coaching — letter style */
.coach-head{margin-bottom:4px;}
.coach-empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:48px 16px 24px;gap:18px;}
.coach-mark{opacity:.92;}
.coach-empty-text{font-size:var(--font-body);color:var(--text-secondary);line-height:1.6;}
.coach-letter{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 20px;}
.cl-lead{font-size:16px;line-height:1.65;color:var(--text-primary);font-weight:500;margin-bottom:18px;}
.cl-action{padding:14px 0;border-top:1px solid var(--divider);}
.cl-action-title{font-size:14px;font-weight:650;color:var(--accent);margin-bottom:5px;letter-spacing:-0.01em;}
.cl-action-body{font-size:14px;line-height:1.6;color:var(--text-secondary);}
.cl-close{margin-top:16px;padding-top:16px;border-top:1px solid var(--divider);font-size:15px;line-height:1.6;color:var(--text-primary);font-weight:500;}

/* Log — calm rows */
.log-list{display:flex;flex-direction:column;gap:10px;}
.log-empty{text-align:center;color:var(--text-secondary);padding:48px 20px;font-size:14px;line-height:1.6;}
.log-row{display:flex;gap:12px;background:var(--surface);border-radius:var(--radius-lg);padding:16px 18px;border-left:2px solid var(--divider);}
.log-row.clean{border-left-color:var(--accent);}
.log-row.partial{border-left-color:var(--warm);}
.lg-main{flex:1;min-width:0;}
.lg-date{font-size:14px;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em;}
.lg-status{font-size:13px;color:var(--text-secondary);margin-top:3px;}
.lg-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.lg-chip{font-size:11px;color:var(--text-muted);background:var(--surface-elevated);border-radius:var(--radius-pill);padding:3px 9px;}
.lg-chip.ok{color:var(--accent);background:var(--accent-soft);}
.lg-note{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-top:9px;}
.lg-weight{font-size:18px;font-weight:650;color:var(--text-primary);white-space:nowrap;font-variant-numeric:tabular-nums;align-self:flex-start;}
.lg-weight span{font-size:12px;color:var(--text-muted);font-weight:450;margin-left:2px;}
.lg-noweight{font-size:18px;color:var(--text-muted);}

/* Friends — companion, not competition */
.share-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:18px;}
.share-info{flex:1;min-width:0;}
.share-lbl{font-size:11px;color:var(--text-muted);}
.share-code{font-size:18px;font-weight:700;letter-spacing:0.04em;color:var(--text-primary);margin-top:2px;}
.share-copy{display:inline-flex;align-items:center;gap:5px;background:var(--surface-elevated);color:var(--text-secondary);font-size:13px;font-weight:500;padding:9px 14px;border-radius:var(--radius-md);border:1px solid var(--border);}
.friend-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.friend-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;}
.friend-row.me{border-color:transparent;outline:1.5px solid var(--accent-soft);background:color-mix(in srgb,var(--accent) 6%,var(--surface));}
.friend-av{width:38px;height:38px;border-radius:50%;background:var(--surface-elevated);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.friend-mid{flex:1;min-width:0;}
.friend-nm{font-size:14px;font-weight:600;color:var(--text-primary);}
.friend-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.friend-prog{height:4px;background:var(--surface-elevated);border-radius:var(--radius-pill);margin-top:8px;overflow:hidden;}
.friend-prog-fill{height:100%;background:var(--accent);border-radius:var(--radius-pill);transition:width .6s var(--ease);}
.friend-cheer{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:500;color:var(--text-secondary);background:var(--surface-elevated);border:1px solid var(--border);border-radius:var(--radius-pill);padding:8px 12px;flex-shrink:0;}
.friend-cheer:active{color:var(--warm);}
.friend-foot{font-size:11px;color:var(--text-muted);text-align:center;line-height:1.7;margin-top:14px;}

/* Alarm — list rows */
.alarm-list{display:flex;flex-direction:column;gap:8px;}
.alarm-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px 12px;}
.alarm-time{flex-shrink:0;background:transparent;border:none;color:var(--text-primary);font-size:16px;font-weight:600;padding:4px 2px;outline:none;font-variant-numeric:tabular-nums;width:auto;}
.alarm-name{flex:1;min-width:0;width:100%;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text-primary);font-size:14px;font-weight:450;padding:5px 2px;outline:none;}
.alarm-name:focus{border-bottom-color:var(--accent);}
.alarm-del{display:flex;align-items:center;justify-content:center;width:34px;height:34px;color:var(--text-muted);border-radius:var(--radius-md);flex-shrink:0;}
.alarm-del .ic{width:18px;height:18px;}
.alarm-del:active{color:var(--danger,#FF6F78);background:rgba(255,111,120,.1);}
.alarm-note{font-size:12px;color:var(--text-muted);line-height:1.6;margin-top:14px;padding:0 2px;}

/* Trend — lighter calendar + weight summary */
.cal-block{margin-bottom:28px;}
.cal-title{font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:12px;letter-spacing:-0.01em;}
.cal-legend{display:flex;justify-content:center;gap:16px;margin-top:14px;}
.cal-legend span{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:5px;}
.trend-weights{display:flex;gap:8px;margin-top:14px;}
.tw-item{flex:1;display:flex;flex-direction:column;gap:3px;}
.tw-lbl{font-size:11px;color:var(--text-muted);}
.tw-val{font-size:15px;font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums;}
.trend-sum{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:4px;}
.trend-sum b{color:var(--text-primary);font-weight:650;font-variant-numeric:tabular-nums;}
.stat-caption{font-size:11px;color:var(--text-muted);margin-bottom:14px;}
.stat-bar-fill{background:var(--warm)!important;}
.stat-bar-name{color:var(--text-secondary);}
.stat-bar-val{color:var(--text-muted)!important;font-variant-numeric:tabular-nums;}
.stat-week{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--divider);padding-top:14px;margin-top:6px;font-size:13px;color:var(--text-secondary);}
.stat-week b{font-weight:700;font-variant-numeric:tabular-nums;}
</style>
</head>
<body>

<div id="onboard">
  <div class="ob-hero">

</div>

<div id="app">
  <div class="header">

      <div class="app-name"><span class="brand-mark" id="brand-mark"></span><span>몸회수</span></div>

  <!-- DATE STRIP (right under title) -->

  <div class="success-hero" id="success-hero">

<script>
const KEY="momhoesu_v1";
let state=null,currentTab="home",tipData=null,tipLoading=false,alarmFired={},autoLine=null,autoLineLoading=false;

// Brand mark — muscleman pictogram (mint, filled, scales via width/height)
function MUSCLEMAN(s,c){
  s=s||22;c=c||"currentColor";
  return `<svg viewBox="0 0 48 56" width="${s}" height="${s}" fill="${c}" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="24" cy="8" rx="7.5" ry="7.5"/>
    <path d="M9 23 C9 18 15 15 24 15 C33 15 39 18 39 23 L37 37 L11 37 Z"/>
    <path d="M11 25 C6 22 2 28 4 34 C5 37 10 38 12 35 L14 27 Z"/>
    <path d="M37 25 C42 22 46 28 44 34 C43 37 38 38 36 35 L34 27 Z"/>
    <path d="M11 37 L13 45 L35 45 L37 37 Z"/>
    <rect x="11" y="45" width="11" height="11" rx="5"/>
    <rect x="26" y="45" width="11" height="11" rx="5"/>
  </svg>`;
}
function MIRROR(s,c){return MUSCLEMAN(s,c);}// legacy alias
// Consistent outline icon set (stroke 1.8, round). Sized via .ic { width:1em } unless overridden.
const _S='<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">';
const ICON={
  check:'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12.5 10 17.5 19 6.5"/></svg>',
  moon:_S+'<path d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5z"/></svg>',
  bag:_S+'<path d="M6.5 8.5h11l-1 11h-9z"/><path d="M9 8.5a3 3 0 0 1 6 0"/></svg>',
  snack:_S+'<circle cx="12" cy="12" r="8.3"/><circle cx="9.2" cy="10" r="1"/><circle cx="14" cy="9.3" r="1"/><circle cx="13.5" cy="14" r="1"/><circle cx="9.6" cy="14.6" r="1"/></svg>',
  run:_S+'<circle cx="14.5" cy="5" r="2"/><path d="M5 20l3.2-4.2 2.3 2 2-5.3 3 2.2h2.5"/><path d="M8.2 11.5l2.3-3.2 3.2 1.1"/></svg>',
  calendar:_S+'<rect x="4" y="5.5" width="16" height="15" rx="2.5"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="8.5" y1="3.5" x2="8.5" y2="7"/><line x1="15.5" y1="3.5" x2="15.5" y2="7"/></svg>',
  pencil:_S+'<path d="M14.5 5l4.5 4.5"/><path d="M4 20l1.2-4.2L16 5l3 3L8.2 18.8z"/></svg>',
  trash:_S+'<path d="M5 7h14"/><path d="M9.5 7V5h5v2"/><path d="M7 7l1 13h8l1-13"/></svg>',
  scale:_S+'<path d="M5.5 9h13l-1.4 10.5h-10.2z"/><circle cx="12" cy="6" r="2.1"/></svg>',
  copy:_S+'<rect x="8.5" y="8.5" width="11.5" height="11.5" rx="2.3"/><path d="M15.5 8.5V6.3A2.3 2.3 0 0 0 13.2 4H6.3A2.3 2.3 0 0 0 4 6.3v6.9a2.3 2.3 0 0 0 2.3 2.3h2.2"/></svg>',
  heart:_S+'<path d="M12 20s-6.8-4.3-6.8-9.2A3.6 3.6 0 0 1 12 8.4a3.6 3.6 0 0 1 6.8 2.4C18.8 15.7 12 20 12 20z"/></svg>',
  note:_S+'<rect x="5" y="4.5" width="14" height="15.5" rx="2.3"/><line x1="8.5" y1="9" x2="15.5" y2="9"/><line x1="8.5" y1="12.5" x2="15.5" y2="12.5"/><line x1="8.5" y1="16" x2="12.5" y2="16"/></svg>',
  dumbbell:_S+'<path d="M3 9v6M6 7.5v9M18 7.5v9M21 9v6M6 12h12"/></svg>',
  arrowRight:_S+'<line x1="4" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>'
};

function loadState(){try{return JSON.parse(localStorage.getItem(KEY));}catch{return null;}}
function saveState(){localStorage.setItem(KEY,JSON.stringify(state));}
function todayStr(){return new Date().toISOString().split("T")[0];}
function fmtDate(s){const d=new Date(s+"T00:00:00");return `${d.getMonth()+1}/${d.getDate()}`;}
function daysSince(s){return Math.floor((Date.now()-new Date(s+"T00:00:00"))/86400000)+1;}

function completeToday(){
  showToast("오늘 기록이 저장됐습니다");
  refreshAutoLine();
}

function editPastLog(dateStr){
  // switch to a past date entry mode
  state._editDate=dateStr;
  saveState();
  renderContent();
}
function clearEditDate(){
  delete state._editDate;
  saveState();
  renderContent();
}
function getActiveDate(){return state._editDate||todayStr();}
function getActiveLog(){const t=getActiveDate();return state.logs.find(l=>l.date===t)||{date:t,weight:"",lateNight:false,delivery:false,sugar:false,cardio:"",cardioType:"",intensity:"",strength:false,mood:"",note:""};} 
function getStreak(logs){let n=0,d=new Date();while(true){const s=d.toISOString().split("T")[0];const l=logs.find(x=>x.date===s);if(!l)break;if(l.lateNight||l.delivery||l.sugar)break;n++;d.setDate(d.getDate()-1);}return n;}
function getTotals(logs){
  let nights=0,deliveries=0,snacks=0,workouts=0,cleanDays=0;
  logs.forEach(l=>{
    if(l.lateNight===false)nights++;
    if(l.delivery===false)deliveries++;
    if(l.sugar===false)snacks++;
    if((l.cardio&&l.cardio!=="0")||l.strength)workouts++;
    if(!l.lateNight&&!l.delivery&&!l.sugar)cleanDays++;
  });
  return {nights,deliveries,snacks,workouts,cleanDays,total:logs.length};
}
function getTodayLog(){const t=todayStr();return state.logs.find(l=>l.date===t)||{date:t,weight:"",lateNight:false,delivery:false,sugar:false,cardio:"",cardioType:"",intensity:"",strength:false,mood:"",note:""};}
function updateLog(fields){const t=todayStr();const tl=getTodayLog();state.logs=state.logs.filter(l=>l.date!==t);state.logs.push({...tl,...fields});saveState();renderHeader();renderContent();}
function updateLogSilent(fields){const t=todayStr();const tl=getTodayLog();state.logs=state.logs.filter(l=>l.date!==t);state.logs.push({...tl,...fields});saveState();}
function updateLogForDate(dt,fields){const tl=state.logs.find(l=>l.date===dt)||{date:dt,weight:"",lateNight:false,delivery:false,sugar:false,cardio:"",cardioType:"",intensity:"",strength:false,mood:"",note:""};state.logs=state.logs.filter(l=>l.date!==dt);state.logs.push({...tl,...fields});saveState();renderHeader();renderContent();}
function updateLogSilentForDate(dt,fields){const tl=state.logs.find(l=>l.date===dt)||{date:dt,weight:"",lateNight:false,delivery:false,sugar:false,cardio:"",cardioType:"",intensity:"",strength:false,mood:"",note:""};state.logs=state.logs.filter(l=>l.date!==dt);state.logs.push({...tl,...fields});saveState();}
function updateAlarm(id,fields){state.alarms=state.alarms.map(a=>a.id===id?{...a,...fields}:a);saveState();renderContent();}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);}
function autoResize(ta){ta.style.height="auto";ta.style.height=Math.max(90,ta.scrollHeight)+"px";}
function initTextareas(){document.querySelectorAll("textarea.note-ta").forEach(ta=>{autoResize(ta);ta.addEventListener("input",()=>autoResize(ta));});}

function renderHeader(){
  const streak=getStreak(state.logs);
  const dayN=daysSince(state.startDate);
  const latestW=[...state.logs].filter(l=>l.weight).sort((a,b)=>b.date.localeCompare(a.date))[0]?.weight;
  const pct=latestW?Math.max(0,Math.min(100,((state.startW-latestW)/(state.startW-state.goalW))*100)):0;
  document.getElementById("hdr-day").textContent=`${state.name} · 회수 ${dayN}일차`;
  const bm=document.getElementById("brand-mark");if(bm)bm.innerHTML=MIRROR(20,"var(--accent)");
  const sEl=document.getElementById("hdr-streak");
  sEl.innerHTML=streak>0?`<span class="ss-strong">${streak}일째</span> 이어가는 중`:`오늘부터 다시 시작`;
  document.getElementById("pm-cur").textContent=latestW||"–";
  document.getElementById("pm-goal").textContent=state.goalW;
  document.getElementById("pm-bar").style.width=pct+"%";
  document.getElementById("pm-start-lbl").textContent=state.startW+" kg 출발";
  document.getElementById("pm-pct").textContent=pct.toFixed(1)+"% 회수";
  renderSuccessHero();
  renderTotals();
  renderDateStrip();
}

function renderDateStrip(){
  const el=document.getElementById("date-strip-wrap");
  if(!el)return;
  if(currentTab!=="home"){el.style.display="none";return;}
  el.style.display="block";
  const activeDate=getActiveDate();
  const isToday=activeDate===todayStr();
  const dateOptions=[];
  for(let i=4;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dateOptions.push(d.toISOString().split("T")[0]);}
  const chips=dateOptions.map(dt=>{
    const d=new Date(dt+"T00:00:00");
    const dow=["일","월","화","수","목","금","토"][d.getDay()];
    const lbl=`${d.getMonth()+1}/${d.getDate()}`;
    const sel=dt===activeDate;
    const isT=dt===todayStr();
    return `<button class="date-chip ${sel?"sel":""} ${isT?"today":""}" onclick="${isT?"clearEditDate()":"editPastLog('"+dt+"')"}"><span class="date-dow">${dow}</span><span class="date-md">${lbl}</span></button>`;
  }).join("");
  const banner=!isToday?`<div class="edit-banner"><span class="eb-ic">${ICON.pencil}</span>${(()=>{const d=new Date(activeDate+"T00:00:00");return `${d.getMonth()+1}월 ${d.getDate()}일`;})()} 기록 수정 중 · <button onclick="clearEditDate()" style="color:var(--warm);text-decoration:underline;font-weight:600;">오늘로</button></div>`:"";
  el.innerHTML=`<div class="date-strip">${chips}
    <button class="date-cal" onclick="var i=document.getElementById('dateCalInput');i.showPicker?i.showPicker():i.click()">${ICON.calendar}</button>
    <input type="date" id="dateCalInput" max="${todayStr()}" value="${activeDate}" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;" onchange="if(this.value){this.value===todayStr()?clearEditDate():editPastLog(this.value);}"/>
  </div>${banner}`;
}

function renderSuccessHero(){
  const tl=getTodayLog();

  const checks=[
    {done:tl.lateNight===false,icon:ICON.moon,lbl:"야식"},

function switchTab(tab){
  currentTab=tab;
  ["home","friends","tip","chart","log","alarm"].forEach(t=>{
    document.getElementById("tl-"+t).classList.toggle("active",t===tab);
    document.getElementById("td-"+t).style.display=t===tab?"block":"none";
  });
  // home-only top cards
  const homeOnly=tab==="home";
  const sh=document.getElementById("success-hero");
  const pm=document.getElementById("progress-mini");
  if(sh)sh.style.display=homeOnly?"block":"none";
  if(pm)pm.style.display=homeOnly?"block":"none";
  renderTotals();
  renderDateStrip();
  renderContent();
}
function renderContent(){
  const c=document.getElementById("content");
  if(currentTab==="home")c.innerHTML=renderHome();
  else if(currentTab==="friends")c.innerHTML=renderFriends();
  else if(currentTab==="tip")c.innerHTML=renderTip();
  else if(currentTab==="chart")c.innerHTML=renderChart();
  else if(currentTab==="log")c.innerHTML=renderLog();
  else if(currentTab==="alarm")c.innerHTML=renderAlarm();
  requestAnimationFrame(initTextareas);
}

function avg(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}
function renderChart(){
  const allW=[...state.logs].filter(l=>l.weight).sort((a,b)=>a.date.localeCompare(b.date));
  const latestW=allW.length?allW[allW.length-1].weight:null;
  const last7=allW.slice(-7).map(l=>l.weight);
  const prev7=allW.slice(-14,-7).map(l=>l.weight);
  const avg7=last7.length?avg(last7):null;
  const prevAvg7=prev7.length?avg(prev7):null;
  const weekChange=avg7&&prevAvg7?(avg7-prevAvg7):null;

  const logs=allW.slice(-14);
  let svgHtml="";
  if(logs.length<2){svgHtml=`<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">2일 이상 기록하면 추세가 나타납니다</div>`;}
  else{
    const weights=logs.map(l=>l.weight);
    const mn=Math.min(...weights,state.goalW)-1,mx=Math.max(...weights)+1;
    const H=80,W=300;
    const mapped=logs.map((l,i,arr)=>({x:arr.length===1?W/2:(i/(arr.length-1))*W,y:H-((l.weight-mn)/(mx-mn))*H,lbl:fmtDate(l.date),w:l.weight}));
    const goalY=H-((state.goalW-mn)/(mx-mn))*H;
    const poly=mapped.map(p=>`${p.x},${p.y}`).join(" ");
    const area=[...mapped,{x:mapped[mapped.length-1].x,y:H},{x:mapped[0].x,y:H}].map(p=>`${p.x},${p.y}`).join(" ");
    svgHtml=`<div class="chart-wrap"><svg width="${W}" height="${H+22}" style="display:block;margin:0 auto;overflow:visible;">
      <defs><linearGradient id="lg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#F5AA3C" stop-opacity="0.13"/><stop offset="100%" stop-color="#F5AA3C" stop-opacity="0"/></linearGradient></defs>
      <line x1="0" y1="${goalY}" x2="${W}" y2="${goalY}" stroke="#43D6A5" stroke-width="1.2" stroke-dasharray="5 4"/>
      <text x="${W}" y="${goalY-4}" fill="#43D6A5" font-size="9" text-anchor="end">목표 ${state.goalW}</text>
      <polyline points="${area}" fill="url(#lg)" stroke="none"/>
      <polyline points="${poly}" fill="none" stroke="#F5AA3C" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${mapped.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="${i===mapped.length-1?5:3}" fill="${i===mapped.length-1?"#F5AA3C":"#161F2E"}" stroke="#F5AA3C" stroke-width="${i===mapped.length-1?0:1.5}"/>${i===mapped.length-1?`<text x="${p.x}" y="${p.y-10}" fill="#F5AA3C" font-size="10" text-anchor="middle" font-weight="700">${p.w}</text>`:""}${(i===0||i===mapped.length-1)?`<text x="${p.x}" y="${H+16}" fill="#707B8D" font-size="9" text-anchor="middle">${p.lbl}</text>`:""}`).join("")}
    </svg></div>`;
  }
  const rem=latestW?(latestW-state.goalW).toFixed(1)+" kg":"–";
  const wcHtml=weekChange!==null?(weekChange<0?`<span style="color:var(--mint);font-weight:700;">▼ ${Math.abs(weekChange).toFixed(1)} kg</span>`:`<span style="color:var(--amber);font-weight:700;">▲ ${weekChange.toFixed(1)} kg</span>`):"–";

  // cumulative recovery stats
  const t=getTotals(state.logs);
  const total=t.total||1;
  const pctOf=(n)=>Math.round((n/total)*100);
  const weeklyRate=getWeeklyRate(state.logs);
  const streak=getStreak(state.logs);

  const sumHtml=`<div class="trend-sum">기록 <b>${t.total}</b>일 · 완전 회수 <b>${t.cleanDays}</b>일 · 연속 <b>${streak}</b>일</div>`;

  const bars=[
    {name:"야식 참음",n:t.nights},
    {name:"배달 안 함",n:t.deliveries},
    {name:"간식 조절",n:t.snacks},
    {name:"운동",n:t.workouts},
  ];
  const barsHtml=bars.map(b=>{
    const p=pctOf(b.n);
    return `<div class="stat-bar-item">
      <div class="stat-bar-head"><span class="stat-bar-name">${b.name}</span><span class="stat-bar-val">${b.n}일 · ${p}%</span></div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${p}%;"></div></div>
    </div>`;
  }).join("");

  // monthly calendar ring view (achievement-based, behavior checks)
  const now=new Date();
  const yr=now.getFullYear(), mo=now.getMonth();
  const firstDay=new Date(yr,mo,1);
  const startOffset=(firstDay.getDay()+6)%7; // Mon=0
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const todayStrV=todayStr();
  const dayCells=[];
  for(let i=0;i<startOffset;i++)dayCells.push(`<div class="cal-cell empty"></div>`);
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const log=state.logs.find(l=>l.date===ds);
    let done=0;
    if(log){
      if(log.lateNight===false)done++;
      if(log.delivery===false)done++;
      if(log.sugar===false)done++;
      if((log.cardio&&log.cardio!=="0")||log.strength)done++;
    }
    const pct=done/4;
    const C=88;
    const isT=ds===todayStrV;
    const isFuture=ds>todayStrV;
    const ringColor=done===4?"#43D6A5":done>0?"#F5AA3C":"#2a3344";
    const ring=isFuture?"":`<svg width="100%" height="100%" viewBox="0 0 38 38"><circle cx="19" cy="19" r="14" fill="none" stroke="#1c2536" stroke-width="3.2"/>${log?`<circle cx="19" cy="19" r="14" fill="none" stroke="${ringColor}" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-pct)}" transform="rotate(-90 19 19)"/>`:""}</svg>`;
    dayCells.push(`<div class="cal-cell ${isT?"today":""}">
      <div class="cal-ring">${ring}</div>
      <div class="cal-num ${isFuture?"future":""}">${d}</div>
    </div>`);
  }
  const monthName=`${yr}년 ${mo+1}월`;
  const dows=["월","화","수","목","금","토","일"];
  const calendarBlock=`<div class="cal-block">
    <div class="cal-title">${monthName}</div>
    <div class="cal-dow-row">${dows.map(w=>`<div class="cal-dow">${w}</div>`).join("")}</div>
    <div class="cal-grid">${dayCells.join("")}</div>
    <div class="cal-legend">
      <span><span class="cal-dot" style="background:#43D6A5;"></span>완전 회수</span>
      <span><span class="cal-dot" style="background:#F5AA3C;"></span>일부</span>
      <span><span class="cal-dot" style="background:#2a3344;"></span>미기록</span>
    </div>
  </div>`;

  return `
  <h2 class="page-title">추세</h2>
  ${calendarBlock}
  <div class="card">
    <div class="card-label">체중 추세</div>${svgHtml}
    <div class="trend-weights">
      <div class="tw-item"><span class="tw-lbl">오늘</span><span class="tw-val">${latestW?latestW+" kg":"–"}</span></div>
      <div class="tw-item"><span class="tw-lbl">7일 평균</span><span class="tw-val">${avg7?avg7.toFixed(1)+" kg":"–"}</span></div>
      <div class="tw-item"><span class="tw-lbl">지난주 대비</span><span class="tw-val">${wcHtml}</span></div>
    </div>
    <div class="chart-note">하루 숫자보다 7일 추세를 봅니다</div>
  </div>
  <div class="card">
    <div class="card-label">회수 통계</div>
    ${sumHtml}
    <div class="stat-caption">최근 ${t.total}일 기록 기준</div>
    ${barsHtml}
    <div class="stat-week"><span>최근 7일 성공률</span><b style="color:${weeklyRate>=70?"var(--accent)":weeklyRate>=40?"var(--warm)":"var(--text-secondary)"};">${weeklyRate}%</b></div>
  </div>`;
}

function renderLog(){
  const sorted=[...state.logs].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length)return `<div class="log-empty">아직 기록이 없습니다.<br>오늘 탭에서 첫 회수를 시작해보세요.</div>`;
  return `<div class="log-list">`+sorted.map(l=>{
    const checks=[l.lateNight===false,l.delivery===false,l.sugar===false,((l.cardio&&l.cardio!=="0")||l.strength)];
    const done=checks.filter(Boolean).length;
    const clean=!l.lateNight&&!l.delivery&&!l.sugar;
    const ex=(l.cardio&&l.cardio!=="0")?`${l.cardioType||"운동"} ${l.cardio}분`:(l.strength?"근력 운동":"");
    const status=`${done}개 완료${ex?" · "+ex:""}`;
    const dlabel=(()=>{const d=new Date(l.date+"T00:00:00");const w=["일","월","화","수","목","금","토"][d.getDay()];return `${d.getMonth()+1}월 ${d.getDate()}일 ${w}`;})();
    const chips=[
      l.lateNight===false?'<span class="lg-chip ok">야식</span>':'',
      l.delivery===false?'<span class="lg-chip ok">배달</span>':'',
      l.sugar===false?'<span class="lg-chip ok">간식</span>':'',
      l.strength?'<span class="lg-chip">근력</span>':'',
    ].filter(Boolean).join("");
    return `<div class="log-row ${clean?"clean":"partial"}">
      <div class="lg-main">
        <div class="lg-date">${dlabel}</div>
        <div class="lg-status">${status}</div>
        ${chips?`<div class="lg-chips">${chips}</div>`:""}
        ${l.note?`<div class="lg-note">${l.note}</div>`:""}
      </div>
      <div class="lg-weight">${l.weight?`${l.weight}<span>kg</span>`:'<span class="lg-noweight">–</span>'}</div>
    </div>`;
  }).join("")+`</div>`;
}

function getWeeklyRate(logs){
  // last 7 days, success = no lateNight/delivery/sugar (clean day)
  const days=[];
  for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}
  const logged=days.map(dt=>logs.find(l=>l.date===dt)).filter(Boolean);
  if(!logged.length)return 0;
  const clean=logged.filter(l=>!l.lateNight&&!l.delivery&&!l.sugar).length;
  return Math.round((clean/logged.length)*100);
}

if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",boot);}else{boot();}
</script>
