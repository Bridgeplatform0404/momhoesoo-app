<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>몸회수</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0A0E16;--surface:#121826;--surface-up:#1A2233;--surface-hi:#222C40;
  --line:rgba(255,255,255,0.06);--line-hi:rgba(255,255,255,0.12);
  --ember:#FF5A36;--ember-glow:rgba(255,90,54,0.20);--ember-deep:#E8421F;
  --mint:#1FD9A0;--mint-glow:rgba(31,217,160,0.16);
  --txt:#EEF2F8;--txt-2:#8A95A8;--txt-3:#4D5667;
  --r-xl:26px;--r-lg:20px;--r-md:15px;--r-sm:11px;--r-pill:999px;
  --ease:cubic-bezier(.34,1.4,.5,1);--ease-out:cubic-bezier(.4,0,.2,1);
  --shadow-card:0 1px 2px rgba(0,0,0,0.3),0 8px 24px rgba(0,0,0,0.28);
  --inner-hi:inset 0 1px 0 rgba(255,255,255,0.05);
}
body{background:var(--bg);color:var(--txt);font-family:"Pretendard Variable",Pretendard,-apple-system,sans-serif;font-weight:450;line-height:1.5;letter-spacing:-0.016em;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden;padding-bottom:100px;background-image:radial-gradient(130% 45% at 50% -5%,rgba(255,90,54,0.07),transparent 55%);}
input,textarea,button{font-family:inherit;letter-spacing:inherit;}
button{cursor:pointer;border:none;background:none;transition:transform .12s var(--ease),opacity .16s,background .16s;}
button:active{transform:scale(.97);}
.tabular{font-variant-numeric:tabular-nums;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}

/* ── Onboarding ── */
#onboard{display:flex;flex-direction:column;min-height:100dvh;padding:env(safe-area-inset-top) 24px calc(32px + env(safe-area-inset-bottom));}
.ob-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.ob-mark{width:96px;height:96px;border-radius:28px;background:linear-gradient(135deg,var(--ember),var(--ember-deep));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px var(--ember-glow);}
.ob-title{font-size:26px;font-weight:800;letter-spacing:-0.03em;margin-top:8px;}
.ob-tag{font-size:14px;color:var(--txt-2);text-align:center;line-height:1.7;}
.ob-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);padding:28px 24px;box-shadow:var(--shadow-card);}
.ob-step{font-size:12px;color:var(--ember);font-weight:700;letter-spacing:0.06em;margin-bottom:14px;}
.ob-q{font-size:21px;font-weight:750;letter-spacing:-0.02em;margin-bottom:6px;}
.ob-desc{font-size:13px;color:var(--txt-2);margin-bottom:22px;line-height:1.6;}
.ob-lbl{font-size:11px;color:var(--txt-3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
.ob-input{width:100%;background:var(--surface-up);border:1.5px solid var(--line-hi);border-radius:var(--r-md);color:var(--txt);font-size:22px;font-weight:700;padding:14px 18px;outline:none;margin-bottom:14px;}
.ob-input:focus{border-color:var(--ember);}
.ob-btn{width:100%;min-height:54px;background:var(--ember);color:#fff;font-weight:700;font-size:16px;border-radius:var(--r-md);margin-top:6px;}
.ob-btn:disabled{opacity:0.35;}
.ob-sum{background:var(--surface-up);border-radius:var(--r-md);padding:18px 20px;margin-bottom:20px;}
.ob-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:11px;}
.ob-row:last-child{margin-bottom:0;}

/* ── App shell ── */
#app{display:none;}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:22px 24px 4px;}
.hdr-name{font-size:17px;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;}
.hdr-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--ember),var(--ember-deep));display:flex;align-items:center;justify-content:center;}
.hdr-day{font-size:13px;color:var(--txt-2);font-weight:500;}
.content{padding-top:4px;}

/* ── Date strip (mini) ── */
.dates{display:flex;gap:7px;padding:14px 24px 0;}
.date{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);}
.date small{font-size:10px;color:var(--txt-3);font-weight:600;}
.date b{font-size:14px;font-weight:700;}
.date.done b{color:var(--mint);}
.date.done{border-color:var(--mint-glow);}
.date.today{background:linear-gradient(135deg,var(--ember),var(--ember-deep));border-color:transparent;}
.date.today small{color:rgba(255,255,255,0.7);}
.date.today b{color:#fff;}
.date-cal{display:flex;align-items:center;justify-content:center;width:42px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--line);color:var(--txt-2);}
.edit-banner{margin:12px 24px 0;background:var(--ember-glow);border:1px solid rgba(255,90,54,0.3);border-radius:var(--r-md);padding:11px 16px;font-size:12.5px;color:var(--ember);text-align:center;}
.edit-banner button{color:var(--ember);text-decoration:underline;font-weight:700;}

/* ── Hero gauge ── */
.hero{display:flex;flex-direction:column;align-items:center;padding:30px 24px 4px;}
.gwrap{position:relative;width:260px;height:260px;}
.gwrap svg{transform:rotate(-90deg);overflow:visible;}
.gtrack{stroke:var(--surface-up);}
.gfill{stroke:url(#eg);stroke-linecap:round;filter:drop-shadow(0 0 10px var(--ember-glow));transition:stroke-dashoffset 1s var(--ease-out),stroke .5s;}
.gcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gnum{font-size:90px;font-weight:800;letter-spacing:-0.06em;line-height:0.85;background:linear-gradient(135deg,#fff,#FFCBBC);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.gof{font-size:13px;color:var(--txt-3);margin-top:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;}
.glabel{font-size:15px;color:var(--ember);font-weight:650;margin-top:8px;}
.gdots{position:absolute;inset:0;}
.gd{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--surface-hi);border:2.5px solid var(--bg);transition:.3s var(--ease);}
.gd.on{background:var(--ember);box-shadow:0 0 10px var(--ember-glow);}

/* ── Check cards ── */
.checks{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:26px 24px 0;}
.chk{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 16px;min-height:92px;display:flex;align-items:center;gap:13px;box-shadow:var(--shadow-card);overflow:hidden;}
.chk:active{transform:scale(.97);}
.chk-ic{width:42px;height:42px;border-radius:13px;background:var(--surface-up);display:flex;align-items:center;justify-content:center;color:var(--txt-2);flex-shrink:0;transition:.2s;}
.chk-name{font-size:15px;font-weight:650;}
.chk-hint{font-size:11.5px;color:var(--txt-3);margin-top:2px;}
.chk.done{background:linear-gradient(155deg,var(--mint-glow),var(--surface));border-color:var(--mint-glow);}
.chk.done .chk-ic{background:var(--mint);color:#0A0E16;}
.chk.done .chk-name{color:var(--mint);}
.chk.done .chk-hint{color:var(--mint);opacity:0.65;}

.fold{text-align:center;padding:30px 0 6px;}
.fold-line{display:inline-flex;align-items:center;gap:8px;color:var(--txt-3);font-size:12px;}
.fold-line::before,.fold-line::after{content:"";width:26px;height:1px;background:var(--line-hi);}

.sec-lbl{font-size:12px;color:var(--txt-3);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:0 26px 10px;}
.card{margin:0 24px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-card);}

/* ── Mood ── */
.mood-row{display:flex;gap:8px;margin-bottom:16px;}
.mood{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;border-radius:var(--r-md);background:var(--surface-up);border:1.5px solid transparent;transition:.18s var(--ease);}
.mood-face{filter:saturate(0.5);transition:filter .2s;}
.mood small{font-size:10px;color:var(--txt-3);}
.mood.sel .mood-face{filter:saturate(1.1);}
.mood.sel small{font-weight:700;}
/* triggers */
.trig-lbl{font-size:12px;color:var(--txt-2);margin-bottom:10px;font-weight:500;}
.trig-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.trig{padding:8px 14px;border-radius:var(--r-pill);font-size:13px;font-weight:550;background:var(--surface-up);border:1px solid var(--line);color:var(--txt-2);transition:.15s;}
.trig.on{background:var(--ember-glow);border-color:var(--ember);color:var(--ember);font-weight:650;}
.note-ta{width:100%;background:var(--surface-up);border:1px solid var(--line);border-radius:var(--r-md);color:var(--txt);font-size:14px;padding:13px 15px;outline:none;resize:none;min-height:72px;line-height:1.6;display:block;}
.note-ta:focus{border-color:var(--line-hi);}
/* 유산소: 한 줄 균등 배치 */
.cardio-row{display:flex;gap:6px;margin-bottom:16px;}
.cardio-row .trig{flex:1;padding:9px 0;text-align:center;display:flex;align-items:center;justify-content:center;}
.cardio-row .trig.plus{flex:0 0 auto;width:42px;}

/* ── Weight ── */
.wtop{display:flex;justify-content:space-between;align-items:center;}
.wval{display:flex;align-items:baseline;gap:7px;}
.wnum-input{background:transparent;border:none;color:var(--txt);font-size:38px;font-weight:800;letter-spacing:-0.04em;outline:none;width:130px;font-variant-numeric:tabular-nums;}
.wunit{font-size:15px;color:var(--txt-2);}
.wtrend{font-size:12px;color:var(--mint);font-weight:700;background:var(--mint-glow);padding:4px 10px;border-radius:var(--r-pill);}
.spark{margin-top:14px;height:44px;}

/* ── Streak dots ── */
.streak-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.streak-big{font-size:15px;font-weight:600;}
.streak-big b{color:var(--ember);font-size:17px;}
.streak-dots{display:flex;justify-content:space-between;gap:6px;}
.sdot{flex:1;aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--surface-up);border:1px solid var(--line);}
.sdot small{font-size:9px;color:var(--txt-3);}
.sdot.full{background:var(--mint-glow);border-color:var(--mint-glow);}
.sdot.full .sdot-ic{color:var(--mint);}
.sdot.part{background:var(--ember-glow);border-color:var(--ember-glow);}
.sdot.part .sdot-ic{color:var(--ember);}
.sdot-ic{width:14px;height:14px;color:var(--txt-3);}
.sdot.today{outline:2px solid var(--ember);outline-offset:1px;}

/* ── AI ── */
.ai{margin:0 24px 12px;background:linear-gradient(135deg,rgba(255,90,54,0.07),var(--surface));border:1px solid var(--ember-glow);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--shadow-card);}
.ai-head{font-size:11px;font-weight:700;color:var(--ember);letter-spacing:0.04em;display:flex;align-items:center;gap:5px;margin-bottom:9px;}
.ai-txt{font-size:14.5px;line-height:1.65;}
.ai-loading{font-size:13px;color:var(--txt-2);}
.ai-cta{margin-top:12px;width:100%;padding:11px;font-size:13px;background:var(--ember-glow);color:var(--ember);border-radius:var(--r-md);font-weight:600;}

.btn-primary{width:100%;min-height:52px;background:var(--ember);color:#fff;font-weight:700;font-size:16px;border-radius:var(--r-md);margin:4px 24px 0;width:calc(100% - 48px);}
.btn-sec{width:calc(100% - 48px);margin:14px 24px 0;min-height:48px;background:var(--surface-up);color:var(--txt);font-weight:600;font-size:14px;border-radius:var(--r-md);border:1px solid var(--line);}

/* ── Page title ── */
.ptitle{font-size:25px;font-weight:780;letter-spacing:-0.03em;padding:8px 24px 4px;}
.psub{font-size:14px;color:var(--txt-2);padding:0 24px 18px;}

/* ── Coaching ── */
.coach-badge{font-size:11px;font-weight:700;color:var(--ember);background:var(--ember-glow);border:1px solid rgba(255,90,54,0.25);border-radius:var(--r-pill);padding:6px 12px;}
.coach-empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:40px 24px;}
.coach-empty p{font-size:15px;color:var(--txt-2);line-height:1.6;}
.coach-letter{margin:0 24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px 20px;box-shadow:var(--shadow-card);}
.cl-lead{font-size:16px;font-weight:550;line-height:1.65;margin-bottom:18px;}
.cl-act{padding:14px 0;border-top:1px solid var(--line);}
.cl-act-t{font-size:14px;font-weight:650;color:var(--ember);margin-bottom:5px;}
.cl-act-b{font-size:14px;color:var(--txt-2);line-height:1.6;}
.cl-close{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:15px;font-weight:550;line-height:1.6;}
.insight{margin:0 24px 12px;background:linear-gradient(135deg,var(--mint-glow),var(--surface));border:1px solid var(--mint-glow);border-radius:var(--r-lg);padding:18px 20px;}
.insight-h{font-size:11px;font-weight:700;color:var(--mint);letter-spacing:0.04em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.insight-t{font-size:14px;line-height:1.6;}

/* ── Trend ── */
.cal-block{margin:0 24px 20px;}
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-title{font-size:15px;font-weight:650;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px;}
.cal-dow span{text-align:center;font-size:10px;color:var(--txt-3);font-weight:600;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
.cal-cell.empty{visibility:hidden;}
.cal-ring{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.cal-num{position:relative;font-size:11px;font-weight:700;z-index:1;color:var(--txt-2);}
.cal-num.fut{color:var(--txt-3);opacity:0.4;}
.cal-cell.today .cal-num{color:var(--ember);}
.cal-legend{display:flex;justify-content:center;gap:14px;margin-top:14px;}
.cal-legend span{font-size:10px;color:var(--txt-3);display:flex;align-items:center;gap:5px;}
.cal-dot{width:8px;height:8px;border-radius:50%;}
.tw-row{display:flex;gap:8px;margin-top:14px;}
.tw{flex:1;}
.tw small{font-size:11px;color:var(--txt-3);display:block;margin-bottom:3px;}
.tw b{font-size:16px;font-weight:700;}
.stat-bar{margin-bottom:13px;}
.stat-bh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.stat-bh b{color:var(--txt-2);}
.stat-bg{height:7px;background:var(--surface-up);border-radius:var(--r-pill);overflow:hidden;}
.stat-fill{height:100%;background:var(--ember);border-radius:var(--r-pill);}

/* badges */
.badges{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 24px 12px;}
.badge{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card);}
.badge.locked{opacity:0.4;}
.badge-ic{width:40px;height:40px;border-radius:11px;background:var(--ember-glow);display:flex;align-items:center;justify-content:center;color:var(--ember);flex-shrink:0;}
.badge.locked .badge-ic{background:var(--surface-up);color:var(--txt-3);}
.badge-n{font-size:14px;font-weight:650;}
.badge-d{font-size:11px;color:var(--txt-3);margin-top:1px;}

/* ── Log ── */
.log-list{padding:0 24px;display:flex;flex-direction:column;gap:10px;}
.log-empty{text-align:center;color:var(--txt-2);padding:40px 24px;font-size:14px;line-height:1.7;}
.log-row{display:flex;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;border-left:3px solid var(--mint);box-shadow:var(--shadow-card);}
.log-row.part{border-left-color:var(--ember);}
.log-row.none{border-left-color:var(--line-hi);}
.log-main{flex:1;min-width:0;}
.log-date{font-size:14px;font-weight:650;}
.log-status{font-size:12.5px;color:var(--txt-2);margin-top:3px;}
.log-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
.log-chip{font-size:11px;color:var(--txt-3);background:var(--surface-up);border-radius:var(--r-pill);padding:3px 9px;}
.log-chip.ok{color:var(--mint);background:var(--mint-glow);}
.log-chip.trig{color:var(--ember);background:var(--ember-glow);}
.log-note{font-size:12.5px;color:var(--txt-2);line-height:1.55;margin-top:8px;}
.log-w{font-size:17px;font-weight:700;white-space:nowrap;align-self:flex-start;}
.log-w span{font-size:11px;color:var(--txt-3);font-weight:450;}

/* ── Friends ── */
.share{display:flex;align-items:center;gap:12px;margin:0 24px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:15px 16px;box-shadow:var(--shadow-card);}
.share-info{flex:1;}
.share-l{font-size:11px;color:var(--txt-3);}
.share-c{font-size:18px;font-weight:700;letter-spacing:0.04em;margin-top:2px;}
.share-btn{display:inline-flex;align-items:center;gap:5px;background:var(--surface-up);color:var(--txt-2);font-size:13px;font-weight:550;padding:9px 14px;border-radius:var(--r-md);border:1px solid var(--line);}
.friend-list{padding:0 24px;display:flex;flex-direction:column;gap:10px;}
.frow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:14px 15px;box-shadow:var(--shadow-card);}
.frow.me{outline:1.5px solid var(--ember-glow);}
.fav{width:40px;height:40px;border-radius:50%;background:var(--surface-up);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.fmid{flex:1;min-width:0;}
.fnm{font-size:14px;font-weight:650;}
.fmeta{font-size:12px;color:var(--txt-3);margin-top:2px;}
.fprog{height:4px;background:var(--surface-up);border-radius:var(--r-pill);margin-top:8px;overflow:hidden;}
.fprog-fill{height:100%;background:var(--ember);border-radius:var(--r-pill);}
.fcheer{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:550;color:var(--txt-2);background:var(--surface-up);border:1px solid var(--line);border-radius:var(--r-pill);padding:8px 12px;flex-shrink:0;}
.ffoot{font-size:11px;color:var(--txt-3);text-align:center;line-height:1.7;margin:14px 24px 0;}

/* ── Alarm ── */
.alarm-list{padding:0 24px;display:flex;flex-direction:column;gap:9px;}
.arow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:12px 14px;box-shadow:var(--shadow-card);}
.atime{background:transparent;border:none;color:var(--txt);font-size:18px;font-weight:700;outline:none;font-variant-numeric:tabular-nums;width:auto;}
.aname{flex:1;min-width:0;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--txt);font-size:14px;padding:5px 2px;outline:none;}
.aname:focus{border-bottom-color:var(--ember);}
.atoggle{padding:7px 15px;font-size:12px;font-weight:700;border-radius:var(--r-md);border:1px solid var(--line);background:var(--surface-up);color:var(--txt-3);}
.atoggle.on{background:var(--mint-glow);color:var(--mint);border-color:var(--mint);}
.adel{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--txt-3);border-radius:var(--r-sm);flex-shrink:0;}
.anote{font-size:12px;color:var(--txt-3);line-height:1.6;margin:14px 24px 0;}

/* ── Tabbar ── */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,14,22,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line);display:none;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:50;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--txt-3);background:none;}
.tab.on{color:var(--ember);}
.tab small{font-size:10.5px;font-weight:600;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface-hi);border:1px solid var(--line-hi);border-radius:var(--r-md);padding:12px 22px;font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

@keyframes pop{0%{transform:scale(.4);}65%{transform:scale(1.2);}100%{transform:scale(1);}}
</style>
</head>
<body>

<div id="onboard"></div>

<div id="app">
  <div class="hdr">
    <div class="hdr-name"><span class="hdr-mark" id="hdr-mark"></span>몸회수</div>
    <button class="hdr-day" id="hdr-set" onclick="openSettings()" style="display:flex;align-items:center;gap:6px;background:none">
      <span id="hdr-day"></span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="color:var(--txt-3)"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.3l2-1.6-2-3.5-2.4 1a7 7 0 0 0-2.2-1.3L14 1h-4l-.3 2.5a7 7 0 0 0-2.2 1.3l-2.4-1-2 3.5 2 1.6A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.3l-2 1.6 2 3.5 2.4-1a7 7 0 0 0 2.2 1.3L10 23h4l.3-2.5a7 7 0 0 0 2.2-1.3l2.4 1 2-3.5-2-1.6c.1-.4.1-.8.1-1.3z"/></svg>
    </button>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="tabbar" id="tabbar"></div>
<div id="toast"></div>

<script>
const KEY="momhoesu_v3";
let state=null,tab="home",editDate=null,alarmFired={};

/* ─── Icons ─── */
function MARK(s,c){s=s||20;c=c||"#fff";return `<svg viewBox="0 0 48 56" width="${s}" height="${s}" fill="${c}"><ellipse cx="24" cy="9" rx="7" ry="7"/><path d="M10 24 C10 19 16 16 24 16 C32 16 38 19 38 24 L36 37 L12 37 Z"/><path d="M12 26 C7 23 3 29 5 35 C6 38 11 39 13 36 L15 28 Z"/><path d="M36 26 C41 23 45 29 43 35 C42 38 37 39 35 36 L33 28 Z"/><rect x="13" y="44" width="9" height="11" rx="4.5"/><rect x="26" y="44" width="9" height="11" rx="4.5"/></svg>`;}
const S='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">';
const ICON={
  moon:S+'<path d="M20 14.5A8 8 0 1 1 9.5 4a6.3 6.3 0 0 0 10.5 10.5z"/></svg>',
  bag:S+'<path d="M6.5 8.5h11l-1 11h-9z"/><path d="M9 8.5a3 3 0 0 1 6 0"/></svg>',
  snack:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" width="22" height="22"><circle cx="12" cy="12" r="8.3"/><circle cx="9.2" cy="10" r="1"/><circle cx="14" cy="9.3" r="1"/><circle cx="13.5" cy="14" r="1"/></svg>',
  run:S+'<circle cx="14.5" cy="5" r="2"/><path d="M5 20l3.2-4.2 2.3 2 2-5.3 3 2.2h2.5"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="5 12.5 10 17.5 19 6.5"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="20" height="20"><rect x="4" y="5.5" width="16" height="15" rx="2.5"/><line x1="4" y1="9.5" x2="20" y2="9.5"/><line x1="8.5" y1="3.5" x2="8.5" y2="7"/><line x1="15.5" y1="3.5" x2="15.5" y2="7"/></svg>',
  spark:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M12 4l1.6 4.4L18 10l-4.4 1.6L12 16l-1.6-4.4L6 10l4.4-1.6z"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M5 7h14"/><path d="M9.5 7V5h5v2"/><path d="M7 7l1 13h8l1-13"/></svg>',
  flame:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 3c1 3 4 4.5 4 8a4 4 0 0 1-8 0c0-1.5.5-2.5 1-3 .3 1 1 1.5 1.5 1.5C10 8 11 5.5 12 3z"/></svg>',
  trophy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M7 4h10v4a5 5 0 0 1-10 0z"/><path d="M7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3M9 16h6M10 20h4M12 13v3"/></svg>',
  copy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><rect x="8.5" y="8.5" width="11.5" height="11.5" rx="2.3"/><path d="M15.5 8.5V6.3A2.3 2.3 0 0 0 13.2 4H6.3A2.3 2.3 0 0 0 4 6.3v6.9a2.3 2.3 0 0 0 2.3 2.3h2.2"/></svg>',
  heart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 20s-6.8-4.3-6.8-9.2A3.6 3.6 0 0 1 12 8.4a3.6 3.6 0 0 1 6.8 2.4C18.8 15.7 12 20 12 20z"/></svg>'
};
function FACE(k,hex,sz){sz=sz||28;const e="rgba(0,0,0,0.5)";const f={great:`<circle cx="8.8" cy="10.5" r="1.4" fill="${e}"/><circle cx="15.2" cy="10.5" r="1.4" fill="${e}"/><path d="M7.5 13.5 Q12 18.5 16.5 13.5" stroke="${e}" stroke-width="1.6" fill="none" stroke-linecap="round"/>`,good:`<circle cx="8.8" cy="10.8" r="1.3" fill="${e}"/><circle cx="15.2" cy="10.8" r="1.3" fill="${e}"/><path d="M8.5 14 Q12 17 15.5 14" stroke="${e}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`,soso:`<circle cx="8.8" cy="11" r="1.2" fill="${e}"/><circle cx="15.2" cy="11" r="1.2" fill="${e}"/><line x1="8.5" y1="14.8" x2="15.5" y2="14.8" stroke="${e}" stroke-width="1.5" stroke-linecap="round"/>`,down:`<circle cx="8.8" cy="10.5" r="1.3" fill="${e}"/><circle cx="15.2" cy="10.5" r="1.3" fill="${e}"/><path d="M8.5 16 Q12 12.5 15.5 16" stroke="${e}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`,stress:`<path d="M7.2 9 Q8.8 10.5 10.5 9" stroke="${e}" stroke-width="1.3" fill="none" stroke-linecap="round"/><path d="M13.5 9 Q15.2 10.5 16.8 9" stroke="${e}" stroke-width="1.3" fill="none" stroke-linecap="round"/><circle cx="9" cy="11" r="1.2" fill="${e}"/><circle cx="15" cy="11" r="1.2" fill="${e}"/><path d="M8.5 15.5 Q12 13 15.5 15.5" stroke="${e}" stroke-width="1.5" fill="none" stroke-linecap="round"/>`};return `<svg viewBox="0 0 24 24" width="${sz}" height="${sz}"><circle cx="12" cy="12" r="11" fill="${hex}"/>${f[k]||""}</svg>`;}

/* ─── Helpers ─── */
function load(){try{return JSON.parse(localStorage.getItem(KEY));}catch{return null;}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function today(){return new Date().toISOString().split("T")[0];}
function activeDate(){return editDate||today();}
function daysSince(s){return Math.floor((Date.now()-new Date(s+"T00:00:00"))/864e5)+1;}
function blankLog(d){return {date:d,weight:"",lateNight:null,delivery:null,sugar:null,cardio:"",strength:false,mood:"",triggers:[],note:""};}
function getLog(d){return state.logs.find(l=>l.date===d)||blankLog(d);}
function setLog(d,f){const l=getLog(d);state.logs=state.logs.filter(x=>x.date!==d);state.logs.push({...l,...f});save();}
function doneCount(l){let n=0;if(l.lateNight===false)n++;if(l.delivery===false)n++;if(l.sugar===false)n++;if((l.cardio&&l.cardio!=="0")||l.strength)n++;return n;}
function streak(){let n=0,d=new Date();while(true){const s=d.toISOString().split("T")[0];const l=state.logs.find(x=>x.date===s);if(!l)break;if(doneCount(l)<4)break;n++;d.setDate(d.getDate()-1);}return n;}
function totals(){let full=0,nights=0,deliv=0,snack=0,workout=0;state.logs.forEach(l=>{if(doneCount(l)===4)full++;if(l.lateNight===false)nights++;if(l.delivery===false)deliv++;if(l.sugar===false)snack++;if((l.cardio&&l.cardio!=="0")||l.strength)workout++;});return {full,nights,deliv,snack,workout,total:state.logs.length};}
function weeklyRate(){const days=[];for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}const lg=days.map(d=>state.logs.find(l=>l.date===d)).filter(Boolean);if(!lg.length)return 0;const f=lg.filter(l=>doneCount(l)===4).length;return Math.round(f/lg.length*100);}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1900);}

const MOODS=[{k:"great",l:"아주좋음",h:"#1FD9A0"},{k:"good",l:"좋음",h:"#5BC0FF"},{k:"soso",l:"보통",h:"#F5AA3C"},{k:"down",l:"우울",h:"#A78BFA"},{k:"stress",l:"스트레스",h:"#FF5A36"}];
const TRIGGERS=["스트레스","피곤","술자리","외로움","지루함","보상심리"];

/* ═══════════ Onboarding ═══════════ */
let obStep=0,obName="",obSW="",obGW="";
function renderOB(){
  const c=document.getElementById("onboard");
  if(obStep===0){
    c.innerHTML=`<div class="ob-hero">
      <div class="ob-mark">${MARK(52)}</div>
      <div class="ob-title">몸회수</div>
      <div class="ob-tag">굶어서 벌주는 앱이 아닙니다.<br>스트레스와 야식에 빼앗긴 몸을<br><b style="color:var(--ember)">다시 회수</b>하는 앱입니다.</div>
    </div>
    <button class="ob-btn" onclick="obStep=1;renderOB()">시작하기</button>`;
  }else if(obStep===1){
    c.innerHTML=`<div class="ob-hero"></div><div class="ob-card">
      <div class="ob-step">1 / 2</div><div class="ob-q">이름이 뭐예요?</div><div class="ob-desc">앱이 당신에게 맞춰집니다</div>
      <div class="ob-lbl">이름 또는 닉네임</div>
      <input class="ob-input" id="obn" placeholder="예: 성안" value="${obName}" oninput="obName=this.value"/>
      <button class="ob-btn" onclick="if(obName.trim()){obStep=2;renderOB()}">다음</button>
    </div>`;
    setTimeout(()=>document.getElementById("obn")?.focus(),100);
  }else if(obStep===2){
    c.innerHTML=`<div class="ob-hero"></div><div class="ob-card">
      <div class="ob-step">2 / 2</div><div class="ob-q">현재 몸무게와 목표를</div><div class="ob-desc">솔직하게 — 여기선 판단 없습니다</div>
      <div class="ob-lbl">현재 체중 (kg)</div>
      <input class="ob-input" id="obs" type="number" placeholder="99" value="${obSW}" oninput="obSW=this.value"/>
      <div class="ob-lbl">목표 체중 (kg)</div>
      <input class="ob-input" id="obg" type="number" placeholder="85" value="${obGW}" oninput="obGW=this.value" style="margin-bottom:0"/>
      <button class="ob-btn" onclick="if(obSW&&obGW)startApp()">회수 시작하기</button>
    </div>`;
  }
}
function startApp(){
  state={name:obName.trim(),startW:parseFloat(obSW),goalW:parseFloat(obGW),startDate:today(),logs:[],
    alarms:[{id:1,label:"기상 + 체중 측정",time:"07:00",on:true},{id:2,label:"저녁 식사 마무리",time:"19:30",on:true},{id:3,label:"주방 닫기·양치",time:"21:00",on:true}]};
  save();initApp();
}
function initApp(){
  document.getElementById("onboard").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("tabbar").style.display="flex";
  document.getElementById("hdr-mark").innerHTML=MARK(15);
  renderTabbar();switchTab("home");
}

/* ═══════════ Tabbar ═══════════ */
const TABS=[["home","오늘",'<ellipse cx="12" cy="9.5" rx="6.2" ry="6.8"/><line x1="12" y1="16.3" x2="12" y2="21.5"/><line x1="9" y1="21.5" x2="15" y2="21.5"/>'],["friends","친구",'<circle cx="9" cy="8" r="3.2"/><path d="M3.5 19.5c0-3 2.6-5.2 5.5-5.2s5.5 2.2 5.5 5.2"/><path d="M16.2 5.3a3 3 0 0 1 0 5.9"/>'],["trend","추세",'<polyline points="3 16 9 10 13 14 21 6"/><polyline points="15 6 21 6 21 12"/>'],["log","기록",'<rect x="5" y="4.5" width="14" height="16" rx="2.5"/><line x1="8.5" y1="11.5" x2="15.5" y2="11.5"/><line x1="8.5" y1="15" x2="13" y2="15"/>'],["alarm","알람",'<path d="M6 9.5a6 6 0 0 1 12 0c0 4.8 1.8 6 1.8 6H4.2S6 14.3 6 9.5z"/><path d="M10 19a2 2 0 0 0 4 0"/>']];
function renderTabbar(){
  document.getElementById("tabbar").innerHTML=TABS.map(([k,l,p])=>`<button class="tab ${k===tab?"on":""}" onclick="switchTab('${k}')"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${p}</svg><small>${l}</small></button>`).join("");
}
function switchTab(t){tab=t;editDate=null;renderTabbar();renderHeader();render();window.scrollTo(0,0);}
function renderHeader(){
  document.getElementById("hdr-day").textContent=`회수 ${daysSince(state.startDate)}일차 · ${dowKr(today())} ${md(today())}`;
}
function dowKr(s){return ["일","월","화","수","목","금","토"][new Date(s+"T00:00:00").getDay()];}
function md(s){const d=new Date(s+"T00:00:00");return `${d.getMonth()+1}/${d.getDate()}`;}

function render(){
  const c=document.getElementById("content");
  if(tab==="home")c.innerHTML=renderHome();
  else if(tab==="friends")c.innerHTML=renderFriends();
  else if(tab==="tip")c.innerHTML=renderTip();
  else if(tab==="trend")c.innerHTML=renderTrend();
  else if(tab==="log")c.innerHTML=renderLog();
  else if(tab==="alarm")c.innerHTML=renderAlarm();
  if(tab==="home"){placeDots();gaugeTick(false);}
}

/* ═══════════ HOME ═══════════ */
function renderHome(){
  const d=activeDate(),isToday=d===today(),l=getLog(d);
  const done=doneCount(l);
  // 날짜 스트립
  const ds=[];for(let i=4;i>=0;i--){const x=new Date();x.setDate(x.getDate()-i);ds.push(x.toISOString().split("T")[0]);}
  const strip=ds.map(dt=>{const lg=state.logs.find(l=>l.date===dt);const full=lg&&doneCount(lg)===4;const isT=dt===today();const sel=dt===d;return `<button class="date ${full?"done":""} ${isT?"today":""}" onclick="${isT?"editDate=null":"editDate='"+dt+"'"};render()"><small>${dowKr(dt)}</small><b>${new Date(dt+"T00:00:00").getDate()}</b></button>`;}).join("");
  const banner=!isToday?`<div class="edit-banner">${new Date(d+"T00:00:00").getMonth()+1}월 ${new Date(d+"T00:00:00").getDate()}일 기록 수정 중 · <button onclick="editDate=null;render()">오늘로</button></div>`:"";
  // 체크
  const checks=[["lateNight","야식","없이 마감",ICON.moon],["delivery","배달","계획대로",ICON.bag],["sugar","간식","탭해서 체크",ICON.snack],["__ex","운동","탭해서 체크",ICON.run]];
  const checkHtml=checks.map(([k,name,hint,ic])=>{
    let isDone=k==="__ex"?((l.cardio&&l.cardio!=="0")||l.strength):l[k]===false;
    return `<button class="chk ${isDone?"done":""}" onclick="toggleCheck('${k}')"><div class="chk-ic">${ic}</div><div><div class="chk-name">${name}</div><div class="chk-hint">${isDone?(k==="__ex"?"오늘 운동함":"잘 회수했어요"):hint}</div></div></button>`;
  }).join("");
  // 기분
  const moodHtml=MOODS.map(m=>`<button class="mood ${l.mood===m.k?"sel":""}" style="${l.mood===m.k?`border-color:${m.h}`:""}" onclick="setLog(activeDate(),{mood:'${m.k}'});render()"><span class="mood-face">${FACE(m.k,m.h,28)}</span><small style="${l.mood===m.k?`color:${m.h}`:""}">${m.l}</small></button>`).join("");
  const trigHtml=TRIGGERS.map(t=>`<button class="trig ${(l.triggers||[]).includes(t)?"on":""}" onclick="toggleTrig('${t}')">${t}</button>`).join("");
  // 체중 추세
  const ws=[...state.logs].filter(x=>x.weight).sort((a,b)=>a.date.localeCompare(b.date));
  const latestW=ws.length?ws[ws.length-1].weight:null;
  const week7=ws.slice(-7),prev7=ws.slice(-14,-7);
  const avg=a=>a.reduce((s,x)=>s+x.weight,0)/a.length;
  const wc=week7.length&&prev7.length?(avg(week7)-avg(prev7)):null;
  const trendChip=wc!==null?(wc<0?`<span class="wtrend">▼ ${Math.abs(wc).toFixed(1)}kg 7일</span>`:`<span class="wtrend" style="color:var(--ember);background:var(--ember-glow)">▲ ${wc.toFixed(1)}kg</span>`):"";
  const spark=ws.length>1?buildSpark(ws.slice(-7).map(x=>x.weight)):"";

  return `
    <div class="dates">${strip}<button class="date-cal" onclick="pickDate()">${ICON.cal}</button></div>
    ${banner}
    <div class="hero"><div class="gwrap">
      <svg width="260" height="260" viewBox="0 0 260 260" style="transform:rotate(-90deg);overflow:visible">
        <defs><linearGradient id="eg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF7A4D"/><stop offset="100%" stop-color="#FF3D1A"/></linearGradient></defs>
        <circle class="gtrack" cx="130" cy="130" r="114" fill="none" stroke-width="16"/>
        <circle class="gfill" id="gfill" cx="130" cy="130" r="114" fill="none" stroke-width="16" stroke-dasharray="716" stroke-dashoffset="${716*(1-done/4)}"/>
      </svg>
      <div class="gdots" id="gdots"></div>
      <div class="gcenter"><div class="gnum tabular" id="gnum">${done}</div><div class="gof">오늘의 회수</div><div class="glabel" id="glabel">${["오늘 시작해볼까요","한 걸음 뗐어요","절반 왔어요","거의 다 왔어요","오늘 완전 회수!"][done]}</div></div>
    </div></div>
    <div class="checks">${checkHtml}</div>
    <div class="fold"><span class="fold-line">아래로 내리면 기록</span></div>

    <div class="sec-lbl">오늘 기분 · 무너진 이유</div>
    <div class="card">
      <div class="mood-row">${moodHtml}</div>
      <div class="trig-lbl">오늘 흔들렸다면, 왜였나요? <span style="color:var(--txt-3)">(선택)</span></div>
      <div class="trig-row">${trigHtml}</div>
      <textarea class="note-ta" placeholder="한 줄 메모 — 오늘 어땠는지 적어보세요" oninput="setLog(activeDate(),{note:this.value})">${l.note||""}</textarea>
    </div>

    <div class="sec-lbl">체중</div>
    <div class="card">
      <div class="wtop"><div class="wval"><input class="wnum-input tabular" type="number" step="0.1" placeholder="–" value="${l.weight||""}" oninput="setLog(activeDate(),{weight:parseFloat(this.value)||''})"/><span class="wunit">kg</span></div>${trendChip}</div>
      ${spark}
      <div style="font-size:12px;color:var(--txt-3);text-align:center;margin-top:12px">하루 숫자보다 7일 추세를 봅니다</div>
    </div>

    <div class="sec-lbl">운동 상세</div>
    <div class="card">
      <div class="trig-lbl">유산소 시간</div>

function buildSpark(arr){
  if(arr.length<2)return "";
  const mn=Math.min(...arr)-0.5,mx=Math.max(...arr)+0.5,W=320,H=44;
  const pts=arr.map((w,i)=>({x:i/(arr.length-1)*W,y:H-((w-mn)/(mx-mn))*H}));
  const poly=pts.map(p=>`${p.x.toFixed(0)},${p.y.toFixed(0)}`).join(" ");
  const area=`${poly} ${W},${H} 0,${H}`;
  return `<svg class="spark" viewBox="0 0 320 44" preserveAspectRatio="none"><defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF5A36" stop-opacity="0.22"/><stop offset="100%" stop-color="#FF5A36" stop-opacity="0"/></linearGradient></defs><polygon points="${area}" fill="url(#sg)"/><polyline points="${poly}" fill="none" stroke="#FF5A36" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${pts[pts.length-1].x.toFixed(0)}" cy="${pts[pts.length-1].y.toFixed(0)}" r="4" fill="#FF5A36"/></svg>`;
}

/* AI line */
/* 규칙 기반 한 줄 — AI 없이, 기록을 읽고 격려 (심판 아닌 거울) */
function ruleLine(l){
  const done=doneCount(l);
  const moodKr={great:"아주좋음",good:"좋음",soso:"보통",down:"우울",stress:"스트레스"};
  const trig=(l.triggers||[]);
  const st=streak();
  // 무너진 날에도 열고 싶은 앱 — 0개여도 격려
  if(done===0){
    if(l.mood||trig.length||l.note)return "오늘은 흔들렸어도, 기록을 남긴 것 자체가 회수의 시작이에요.";
    return "체크 하나만 눌러보세요. 완벽하지 않아도 괜찮아요.";
  }
  // 스트레스/우울인데 뭔가 지켜냄 — 특별히 인정
  if((l.mood==="stress"||l.mood==="down")&&done>=2){
    return `${moodKr[l.mood]}한 날에 ${done}개나 지켜낸 거, 그게 진짜 회복력이에요.`;
  }
  // 4/4 완전 회수
  if(done===4){
    if(st>=2)return `${st}일 연속 완전 회수! 이 흐름이 곧 몸을 바꿉니다.`;
    return "오늘 완전 회수 성공. 내일도 이 느낌 그대로 가요.";
  }
  // 3/4 — 하나만 더
  if(done===3){
    const missing=[];if(l.lateNight!==false)missing.push("야식");if(l.delivery!==false)missing.push("배달");if(l.sugar!==false)missing.push("간식");if(!((l.cardio&&l.cardio!=="0")||l.strength))missing.push("운동");
    if(missing[0]==="운동")return "거의 다 왔어요. 20분 걷기 하나면 오늘 완전 회수예요.";
    return `거의 다 왔어요. ${missing[0]} 하나만 더 챙기면 오늘 완전 회수입니다.`;
  }
  // 1~2개
  return `${done}개 회수 중. 지금 이 순간 하나만 더 선택해보세요.`;
}

function renderTip(){
  const head=`<div class="ptitle">내 패턴</div><div class="psub">기분과 행동을 연결해, 내가 무너지는 지점을 보여드립니다.</div>`;
  const t=totals();
  if(t.total<2){
    return head+`<div class="coach-empty"><div>${MARK(46,"var(--ember)")}</div><p>며칠 기록이 쌓이면<br>나만의 무너짐 패턴이 보이기 시작해요.<br><span style="color:var(--txt-3);font-size:13px">지금은 ${t.total}일 기록됨</span></p></div>`;
  }
  let out=head;
  // 1) 트리거 패턴
  const trigIns=buildInsight();if(trigIns)out+=trigIns;
  // 2) 약한 고리 (가장 안 지켜진 항목)
  const weak=weakestLink();if(weak)out+=weak;
  // 3) 기분-회수 상관
  const moodIns=moodInsight();if(moodIns)out+=moodIns;

  out+=weekSummary();
  return out;
}
function buildInsight(){
  const withTrig=state.logs.filter(l=>(l.triggers||[]).length>0);
  if(withTrig.length<3)return "";
  const count={};
  withTrig.forEach(l=>{if(doneCount(l)<4)(l.triggers||[]).forEach(t=>count[t]=(count[t]||0)+1);});
  const top=Object.entries(count).sort((a,b)=>b[1]-a[1])[0];
  if(!top||top[1]<2)return "";
  return `<div class="insight"><div class="insight-h">${ICON.spark}발견된 패턴</div><div class="insight-t"><b style="color:var(--mint)">${top[0]}</b> 느낀 날에 회수가 무너지는 경우가 많았어요(${top[1]}회). 그 순간을 미리 알아채면 절반은 이긴 겁니다.</div></div>`;
}
function weakestLink(){
  const t=totals();if(t.total<3)return "";
  const items=[["야식 참기",t.nights,"늦은 시간 주방을 미리 닫아두면 도움이 돼요"],["배달 줄이기",t.deliv,"배달 앱 알림을 꺼두는 것만으로 충동이 줄어요"],["간식 조절",t.snack,"눈에 보이는 곳에서 간식을 치워보세요"],["운동",t.workout,"10분 걷기부터 — 시작이 가장 어려운 법이에요"]];
  items.sort((a,b)=>a[1]-b[1]);

  return `<div class="card" style="margin:0 24px 12px"><div style="font-size:12px;font-weight:700;color:var(--ember);letter-spacing:0.04em;margin-bottom:9px;display:flex;align-items:center;gap:5px">${ICON.spark}가장 약한 고리</div><div style="font-size:15px;font-weight:650;margin-bottom:5px"><b style="color:var(--ember)">${name}</b>가 ${rate}%로 가장 흔들려요</div><div style="font-size:13px;color:var(--txt-2);line-height:1.6">${tip}</div></div>`;
}
function moodInsight(){
  const withMood=state.logs.filter(l=>l.mood);

  const good=withMood.filter(l=>l.mood==="great"||l.mood==="good");
  const bad=withMood.filter(l=>l.mood==="stress"||l.mood==="down");

/* ═══════════ TREND ═══════════ */
function renderTrend(){
  const t=totals(),wr=weeklyRate(),st=streak();
  const ws=[...state.logs].filter(x=>x.weight).sort((a,b)=>a.date.localeCompare(b.date));
  const latestW=ws.length?ws[ws.length-1].weight:null;
  const week7=ws.slice(-7),prev7=ws.slice(-14,-7);
  const avg=a=>a.length?a.reduce((s,x)=>s+x.weight,0)/a.length:null;
  const a7=avg(week7),pa7=avg(prev7),wc=a7&&pa7?a7-pa7:null;
  // 캘린더
  const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  const first=new Date(yr,mo,1),off=(first.getDay()+6)%7,dim=new Date(yr,mo+1,0).getDate();
  let cells="";for(let i=0;i<off;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let dd=1;dd<=dim;dd++){const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;const lg=state.logs.find(l=>l.date===ds);const dn=lg?doneCount(lg):0;const isT=ds===today();const fut=ds>today();const col=dn===4?"#1FD9A0":dn>0?"#FF5A36":"#222C40";const C=88;const ring=fut?"":`<svg width="100%" height="100%" viewBox="0 0 38 38" style="max-width:40px;max-height:40px"><circle cx="19" cy="19" r="14" fill="none" stroke="#1A2233" stroke-width="3"/>${lg?`<circle cx="19" cy="19" r="14" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C*(1-dn/4)}" transform="rotate(-90 19 19)"/>`:""}</svg>`;cells+=`<div class="cal-cell ${isT?"today":""}"><div class="cal-ring">${ring}</div><div class="cal-num ${fut?"fut":""}">${dd}</div></div>`;}
  // 배지
  const badges=[{n:"첫 회수",d:"기록 시작",ic:ICON.flame,unlock:t.total>=1},{n:"7일 연속",d:"연속 7일 완전회수",ic:ICON.flame,unlock:st>=7},{n:"완전 회수 10일",d:"누적 10일",ic:ICON.trophy,unlock:t.full>=10},{n:"30일 여정",d:"30일 기록",ic:ICON.trophy,unlock:t.total>=30}];
  return `
    <div class="ptitle">추세</div>
    <div class="psub">하루의 숫자가 아니라, 쌓인 흐름을 봅니다.</div>
    <div class="cal-block">
      <div class="cal-head"><div class="cal-title">${yr}년 ${mo+1}월</div></div>
      <div class="cal-dow"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span></div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend"><span><span class="cal-dot" style="background:#1FD9A0"></span>완전 회수</span><span><span class="cal-dot" style="background:#FF5A36"></span>일부</span><span><span class="cal-dot" style="background:#222C40"></span>미기록</span></div>
    </div>
    <div class="sec-lbl">체중 추세</div>
    <div class="card">
      ${ws.length>1?buildSpark(ws.slice(-14).map(x=>x.weight)):'<div style="color:var(--txt-3);font-size:13px;text-align:center;padding:16px 0">2일 이상 기록하면 추세가 보입니다</div>'}
      <div class="tw-row"><div class="tw"><small>오늘</small><b>${latestW?latestW+" kg":"–"}</b></div><div class="tw"><small>7일 평균</small><b>${a7?a7.toFixed(1)+" kg":"–"}</b></div><div class="tw"><small>지난주 대비</small><b style="color:${wc!==null&&wc<0?"var(--mint)":"var(--ember)"}">${wc!==null?(wc<0?"▼ ":"▲ ")+Math.abs(wc).toFixed(1)+" kg":"–"}</b></div></div>
    </div>
    <div class="sec-lbl">회수 통계 · 최근 ${t.total}일</div>
    <div class="card">
      <div style="font-size:14px;color:var(--txt-2);margin-bottom:16px">완전 회수 <b style="color:var(--mint)">${t.full}</b>일 · 연속 <b style="color:var(--ember)">${st}</b>일 · 이번 주 <b>${wr}%</b></div>
      ${[["야식 참음",t.nights],["배달 안 함",t.deliv],["간식 조절",t.snack],["운동",t.workout]].map(([n,v])=>{const p=t.total?Math.round(v/t.total*100):0;return `<div class="stat-bar"><div class="stat-bh"><span style="color:var(--txt-2)">${n}</span><b>${v}일 · ${p}%</b></div><div class="stat-bg"><div class="stat-fill" style="width:${p}%"></div></div></div>`;}).join("")}
    </div>
    <div class="sec-lbl">배지</div>
    <div class="badges">${badges.map(b=>`<div class="badge ${b.unlock?"":"locked"}"><div class="badge-ic">${b.ic}</div><div><div class="badge-n">${b.n}</div><div class="badge-d">${b.d}</div></div></div>`).join("")}</div>
  `;
}

/* ═══════════ LOG ═══════════ */
function renderLog(){
  const sorted=[...state.logs].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length)return `<div class="ptitle">기록</div><div class="log-empty">아직 기록이 없습니다.<br>오늘 탭에서 첫 회수를 시작해보세요.</div>`;
  const moodKr={great:"😊",good:"🙂",soso:"😐",down:"😔",stress:"😣"};
  const rows=sorted.map(l=>{
    const dn=doneCount(l),cls=dn===4?"":dn>0?"part":"none";
    const ex=(l.cardio&&l.cardio!=="0")?`운동 ${l.cardio}분`:(l.strength?"근력":"");
    const dlabel=`${new Date(l.date+"T00:00:00").getMonth()+1}월 ${new Date(l.date+"T00:00:00").getDate()}일 ${dowKr(l.date)}`;
    const chips=[l.lateNight===false?'<span class="log-chip ok">야식</span>':"",l.delivery===false?'<span class="log-chip ok">배달</span>':"",l.sugar===false?'<span class="log-chip ok">간식</span>':"",l.strength?'<span class="log-chip">근력</span>':"",...(l.triggers||[]).map(t=>`<span class="log-chip trig">${t}</span>`)].filter(Boolean).join("");
    return `<div class="log-row ${cls}"><div class="log-main"><div class="log-date">${dlabel}</div><div class="log-status">${dn}/4 회수${ex?" · "+ex:""}</div>${chips?`<div class="log-chips">${chips}</div>`:""}${l.note?`<div class="log-note">${l.note}</div>`:""}</div><div class="log-w">${l.weight?`${l.weight}<span>kg</span>`:'<span style="color:var(--txt-3)">–</span>'}</div></div>`;
  }).join("");
  return `<div class="ptitle">기록</div><div class="psub">${sorted.length}일의 회수 여정</div><div class="log-list">${rows}</div>`;
}

/* ═══════════ FRIENDS ═══════════ */
const DEMO=[{n:"와이프",a:"🌸",rate:86,on:true},{n:"동생",a:"🐯",rate:57,on:true},{n:"러닝메이트 J",a:"🏃",rate:71,on:false}];
function renderFriends(){
  const myRate=weeklyRate(),code="MH"+(state.name?state.name.length:2)+"7K"+state.startDate.slice(-2);
  const all=[{n:state.name+" (나)",rate:myRate,me:true},...DEMO];
  const rows=all.map(f=>{const days=Math.round(f.rate/100*7);const logged=f.me?state.logs.some(l=>l.date===today()):f.on;return `<div class="frow ${f.me?"me":""}"><div class="fav">${f.me?MARK(20,"var(--ember)"):f.a}</div><div class="fmid"><div class="fnm">${f.n}</div><div class="fmeta">${logged?"오늘 기록함":"아직 오늘 기록 전"} · 이번 주 ${days}일</div><div class="fprog"><div class="fprog-fill" style="width:${days/7*100}%"></div></div></div>${f.me?"":`<button class="fcheer" onclick="toast('응원을 보냈어요')">${ICON.heart}응원</button>`}</div>`;}).join("");
  return `
    <div class="ptitle">함께 이어가는 중</div>
    <div class="psub">서로의 기록을 가볍게 응원해요.</div>
    <div class="share"><div class="share-info"><div class="share-l">내 친구 코드</div><div class="share-c">${code}</div></div><button class="share-btn" onclick="if(navigator.clipboard)navigator.clipboard.writeText('${code}');toast('코드를 복사했어요')">${ICON.copy}복사</button></div>
    <div class="friend-list">${rows}</div>
    <button class="btn-sec" onclick="toast('출시 버전에서 친구를 추가할 수 있습니다')">친구 코드로 추가하기</button>
    <div class="ffoot">친구에게는 주간 기록 정도만 보입니다.<br>체중·식단·메모는 공유되지 않습니다.</div>
  `;
}

/* ═══════════ ALARM ═══════════ */
function renderAlarm(){
  const items=state.alarms.map(a=>`<div class="arow"><input class="atime" type="time" value="${a.time}" onchange="updAlarm(${a.id},{time:this.value})"/><input class="aname" type="text" value="${(a.label||"").replace(/"/g,"&quot;")}" placeholder="알람 이름" onchange="updAlarm(${a.id},{label:this.value})"/><button class="atoggle ${a.on?"on":""}" onclick="togAlarm(${a.id})">${a.on?"ON":"OFF"}</button><button class="adel" onclick="delAlarm(${a.id})">${ICON.trash}</button></div>`).join("");
  return `<div class="ptitle">알람</div><div class="psub">가장 흔들리기 쉬운 시간대에 나만의 알림을 설정하세요.</div><div class="alarm-list">${items}</div><button class="btn-sec" onclick="addAlarm()">+ 알람 추가</button><div class="anote">이 화면을 열어둔 상태에서 알람이 울립니다. 정식 앱에서는 백그라운드 알림이 가능합니다.</div>`;
}
function updAlarm(id,f){state.alarms=state.alarms.map(a=>a.id===id?{...a,...f}:a);save();}
function togAlarm(id){const a=state.alarms.find(x=>x.id===id);if(!a.on&&"Notification" in window)Notification.requestPermission();updAlarm(id,{on:!a.on});render();}
function addAlarm(){const id=Math.max(0,...state.alarms.map(a=>a.id))+1;state.alarms.push({id,label:"새 알람",time:"21:00",on:true});save();render();}
function delAlarm(id){state.alarms=state.alarms.filter(a=>a.id!==id);save();render();}
setInterval(()=>{if(!state)return;const now=new Date();const hm=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;state.alarms.forEach(a=>{if(!a.on)return;const k=a.id+hm;if(a.time===hm&&!alarmFired[k]){alarmFired[k]=true;if("Notification" in window&&Notification.permission==="granted")new Notification("⏰ "+a.label,{body:a.time});}});if(now.getMinutes()===0)alarmFired={};},30000);

/* ═══════════ Boot ═══════════ */
function boot(){
  try{state=load();if(state&&state.logs)initApp();else renderOB();}
  catch(e){document.getElementById("onboard").innerHTML='<div style="padding:40px;color:#FF5A36">초기화 오류: '+e.message+'</div>';}
}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",boot);else boot();
</script>
</body>
</html>
